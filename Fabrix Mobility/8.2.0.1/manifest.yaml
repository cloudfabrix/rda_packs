  pstreams:

    - name: snmp_traps_not_onboarded
      attributes:
        retention_days: 7
      creation_policy: overwrite
      remove_on_deactivation: false
    - name: syslog_udp_event_stream
      attributes:
        retention_days: 7
        search_case_insensitive: false
        default_values:
          device_status: UNMANAGED
        enrich:
          dict: mobility_device_mappings
          dict_source: dataset
          src_key_cols: rda_gw_client_ip
          dict_key_cols: ip_address
          enrich_cols: device_status,device_hostname,device_vendor,device_fw_type,device_model,device_fw_version,parent_sn,device_serial_number,zone,network_type,clli_code,city,region,network_code,image,device,latitude,longitude
          enrich_cols_as: device_status,device_hostname,device_vendor,device_fw_type,device_model,device_fw_version,parent_sn,device_serial_number,zone,network_type,CLLI_code,city,region,network_code,image,device,latitude,longitude
          replace_values: 'no'
          dict_update_check_seconds: 60
      creation_policy: overwrite
      remove_on_deactivation: false
    - name: snmp_trap_event_stream
      attributes:
        retention_days: 90
        search_case_insensitive: false
        default_values:
          device_status: UNMANAGED
        enrich:
          dict: mobility_device_mappings
          dict_source: dataset
          src_key_cols: rda_gw_client_ip
          dict_key_cols: ip_address
          enrich_cols: device_status,device_hostname,device_vendor,device_fw_type,device_model,device_fw_version,parent_sn,device_serial_number,zone,network_type,clli_code,city,region,network_code,image,device,latitude,longitude
          enrich_cols_as: device_status,device_hostname,device_vendor,device_fw_type,device_model,device_fw_version,parent_sn,device_serial_number,zone,network_type,CLLI_code,city,region,network_code,image,device,latitude,longitude
          replace_values: 'no'
          dict_update_check_seconds: 60
      creation_policy: overwrite
      remove_on_deactivation: false
    - name: discovery
      attributes:
          unique_keys: [ "unique_id"]
          retention_days: 60
          search_case_insensitive: true
          _settings:
            number_of_shards: 1
            number_of_replicas: 1
      creation_policy: overwrite
      remove_on_deactivation: false
    - name: network-devices-inventory
      attributes:
        unique_keys: ["unique_id"]
        search_case_insensitive: true
        _settings:
          number_of_shards: 3
          number_of_replicas: 1
          refresh_interval: 30s
      creation_policy: overwrite
      remove_on_deactivation: false
    - name: network_access_verification
      attributes:
        unique_keys: ["unique_id"]
        retention_days: 7
      creation_policy: overwrite
      remove_on_deactivation: false
    - name: mobility_reports_metadata
      attributes:
        source_dataset: "mobility_reports_metadata"
        unique_keys: [ "schema","report_name_key" ]
        os_external: false
      creation_policy: overwrite
      remove_on_deactivation: false
    - name: Autox_KPI_list_new
      attributes:
        source_dataset: "Autox_KPI_list_new"
        os_external: false
      creation_policy: overwrite
      remove_on_deactivation: false
    - name: mobility_validated_kpi_list
      attributes:
        unique_keys: [ "KPI_Name"]
        retention_days: 365
        os_external: false
      creation_policy: overwrite
      remove_on_deactivation: false
    - name: bulkstats_variables
      attributes:
        unique_keys: [ "schema","variable" ]
        source_dataset: "bulkstats_variables"
        os_external: false
      creation_policy: overwrite
      remove_on_deactivation: false




