<div style="font-family: Arial, sans-serif; font-size: 14px; color: #333;">
    <p>A new incident <strong>{{incidentId}}</strong> was created at <strong>{{created}}</strong>.</p>

    <h3 style="color: #0056b3;">Incident Details:</h3>

    <table style="border-collapse: collapse; width: 100%; max-width: 600px;">
      <tr>
        <td style="padding: 8px; font-weight: bold;">Summary:</td>
        <td style="padding: 8px;">{{summary}}</td>
      </tr>
      <tr>
        <td style="padding: 8px; font-weight: bold;">Description:</td>
        <td style="padding: 8px;">{{description}}</td>
      </tr>
      <tr>
        <td style="padding: 8px; font-weight: bold;">State:</td>
        <td style="padding: 8px;">{{state}}</td>
      </tr>
      <tr>
        <td style="padding: 8px; font-weight: bold;">Priority:</td>
        <td style="padding: 8px;">{{priority}}</td>
      </tr>
      <tr>
        <td style="padding: 8px; font-weight: bold;">Number of Alerts:</td>
        <td style="padding: 8px;">{{alerts}}</td>
      </tr>
      <tr>
        <td style="padding: 8px; font-weight: bold;">Alert Sources:</td>
        <td style="padding: 8px;">{{source}}</td>
      </tr>
    </table>
    <p style="margin-top: 20px;">
      Click <a href="{{attrs_public_url}}" style="color: #007bff; text-decoration: none;"><strong>here</strong></a> to view incident <strong>{{incidentId}}</strong> in the portal.
    </p>
  </div>
