[[inputs.rda_net_response]]
  enabled = true
  alias = "net_response"
  input_definition = '''
  collector:
    input_criteria:
      frequency: 600
      pstream: "discovery"
      query: "type = 'port_metrics' and protocol is not empty and url_field is not empty"
      address_field: "url_field"
      protocol_field: "protocol"

    net_response_properties:
      - name: default
        timeout: 5s
        read_timeout: 3s
        frequency: 30

    output_stream:
      name: "network_response_result"
      type: "pstream"

    ## Data Transformation for Enrichment
    data_transformations:
    - name: classify_latency
      type: starlark
      script: |
        def apply(metric):
          rt = metric.fields.get("response_time")
          if rt != None and (type(rt) == "int" or type(rt) == "float"):
            if rt < 0.05:
              metric.fields["latency_class"] = "excellent"
            elif rt < 0.2:
              metric.fields["latency_class"] = "good"
            elif rt < 1:
              metric.fields["latency_class"] = "fair"
            else:
              metric.fields["latency_class"] = "poor"
          return metric
  '''
