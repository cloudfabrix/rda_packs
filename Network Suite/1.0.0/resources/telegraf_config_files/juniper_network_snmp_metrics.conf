[[inputs.rda_snmp]]
enabled = true
tags = {asset_type = "network_device", vendor = "Juniper", kpi_metric = "yes" }
alias = "juniper"
input_definition= '''
---
version: "1.0"
collector:
  ## Global Collection Frequency for all SNMP Metrics
  frequency: 300

  # Input Pstream to collect the SNMP Metrics for selected Network Devices
  input_criteria:
    frequency: 600
    pstream: network_access_verification
    query: "auth_state is 'Success' and protocol is 'SNMP' and sys_object_id contains '1.3.6.1.4.1.2636.'"
    # Optional: Specify custom field names from the pstream
    # ip_address_field: "device_ip"      # Field containing IP address (defaults to "host" or "ip_address")
    # cred_field: "auth_credential"      # Field containing credential name (defaults to "snmp_cred" or "used_cred")
    ip_address_field: "ip_address"
    cred_field: "used_cred"
  connection_properties:
    - name: default
      retries: 2
      timeout: 10

  scalar_fields:
    # Base System Attributes
    - name: system_info
      ##frequency: 60
      fields:
        - name: sys_name
          oid: "SNMPv2-MIB::sysName.0"
        - name: sys_location
          oid: "SNMPv2-MIB::sysLocation.0"

    # Uptime Metric
    - name: uptime
      ##frequency: 60
      fields:
        - name: sys_name
          oid: "SNMPv2-MIB::sysName.0"
        - name: uptime
          oid: "DISMAN-EVENT-MIB::sysUpTimeInstance"
      custom_attributes:
        - name: uptime_conversion
          params:
            source_field: uptime
            output_prefix: uptime_seconds
      transformations: ["enrich_device_info"]
      field_exclude: ["sys_location"]
      output_stream: rda_snmp_metrics

  table_inventories:
    # Interface Inventory
    - name: interface_inventory
      mib: IF-MIB::ifXTable
      instance_oid: ifIndex
      frequency: 3600
      attributes:
        ifDescr: "interface_description"
        ifAlias: "interface_alias"
        ifType: "interface_type"
        ifAdminStatus: "admin_status"
        ifOperStatus: "oper_status"
        ifName: "interface_name"
        ifIndex: "interface_index"
      custom_attributes:
        - name: interface_status_label
          params:
            admin_status_field: admin_status
            oper_status_field: oper_status
            admin_output_field: admin_status_label
            oper_output_field: oper_status_label
      transformations: ["enrich_device_info"]
      append: ["system_info.sys_name"]
      output_stream:
        name: rda_snmp_network_interfaces_inventory


    # Device Entity Physical Inventory
    - name: entity_physical_inventory
      mib: ENTITY-MIB::entPhysicalTable
      frequency: 3600
      attributes:
        entPhysicalDescr: "description"
        entPhysicalClass: "class"
        entPhysicalContainedIn: "contained_in"
        entPhysicalIsFRU: "is_fru"
        entPhysicalName: "entity_name"
        entPhysicalParentRelPos: "parent_rel_pos"
        entPhysicalVendorType: "vendor_type"
        entPhysicalHardwareRev: "hardware_rev"
        entPhysicalFirmwareRev: "firmware_rev"
        entPhysicalSoftwareRev: "software_rev"
        entPhysicalSerialNum: "serial_number"
        entPhysicalModelName: "model"
        entPhysicalAlias: "alias"
      append: ["system_info.sys_name"]
      output_stream:
        name: rda_snmp_entity_physical_inventory


  metric_collections:

    # CPU Metrics Collection
    - name: "cpu"
      ##frequency: 30
      mib: 1.3.6.1.4.1.2636.3.1.13.1
      attributes:
        1.3.6.1.4.1.2636.3.1.13.1.8: "cpu_total_5sec_rev"
        1.3.6.1.4.1.2636.3.1.13.1.23: "cpu_total_1min_rev"
        1.3.6.1.4.1.2636.3.1.13.1.24: "cpu_total_5min_rev"
      custom_attributes:
        - name: cpu_usage
          params:
            source_field: cpu_total_5sec_rev
            output_field: cpu_usage
      transformations: ["enrich_device_info","cpu_fallback_enrichment"]
      append: ["system_info.sys_name"]
      field_exclude: ["mib","index"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

    # Memory Metric Collection
    - name: "memory"
      ##frequency: 60
      mib: 1.3.6.1.4.1.2636.3.1.13.1
      attributes:
        1.3.6.1.4.1.2636.3.1.13.1.5: "memory_name"
        1.3.6.1.4.1.2636.3.1.13.1.15: "memory_total"
        1.3.6.1.4.1.2636.3.1.13.1.11: "memory_usage"
      transformations: ["enrich_device_info","memory_enrichment"]
      append: ["system_info.sys_name"]
      field_exclude: ["mib","index"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

    # Interface Metrics Collection
    - name: interface
      ##frequency: 90
      mib: IF-MIB::ifTable
      index_field: if_index
      #pstream: rdaf_telegraf_interface
      #filter_query: ""
      attributes:
        IF-MIB::ifHCInOctets: in_octets
        IF-MIB::ifHCOutOctets: out_octets
        IF-MIB::ifDescr: interface_description
        IF-MIB::ifAlias: interface_alias
        IF-MIB::ifHighSpeed: high_speed
        IF-MIB::ifOperStatus: oper_status
        IF-MIB::ifAdminStatus: admin_status
        IF-MIB::ifIndex: interface_index
        IF-MIB::ifType: interface_type
        IF-MIB::ifLastChange: last_change
        IF-MIB::ifInErrors: in_errors
        IF-MIB::ifOutErrors: out_errors
        IF-MIB::ifInDiscards: in_discards
        IF-MIB::ifOutDiscards: out_discards
        IF-MIB::ifSpeed: interface_speed
      custom_attributes:
        - name: interface_utilization
          params:
            speed_field: high_speed
            in_octets_field: in_octets
            out_octets_field: out_octets
        - name: interface_status_label
          params:
            admin_status_field: admin_status
            oper_status_field: oper_status
            admin_output_field: admin_status_label
            oper_output_field: oper_status_label
      transformations: ["enrich_device_info"]
      append: ["system_info.sys_name"]
      field_exclude: ["mib","*_rate","*_time_delta","index","interface_alias"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

    # Interface CRC Errors Metric Collection
    - name: interface_crc_errors
      ##frequency: 30
      mib: 1.3.6.1.2.1.10.7.2.1
      index_field: 1.3.6.1.2.1.10.7.2.1.1
      attributes:
        1.3.6.1.2.1.10.7.2.1.3: crc_errors
        1.3.6.1.2.1.10.7.2.1.2: alignment_errors
        1.3.6.1.2.1.10.7.2.1.13: frame_too_longs
        1.3.6.1.2.1.10.7.2.1.18: symbol_errors
      transformations: ["enrich_device_info"]
      append: ["system_info.sys_name"]
      field_exclude: ["mib","*_rate","*_time_delta","index","interface_alias"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

    # Environmental Sensors for Junos
    - name: environmental_sensors
      mib: 1.3.6.1.4.1.2636.3.1.15
      attributes:
        .1.3.6.1.4.1.2636.3.1.15.1.6: sensor_type 
        .1.3.6.1.4.1.2636.3.1.15.1.8: sensor_status 
        .1.3.6.1.4.1.2636.3.1.15.1.5: sensor_name
      transformations: ["enrich_device_info","sensor_status_enrichment","sensor_type_enrichment"]
      append: ["system_info.sys_name"]
      field_exclude: ["mib","index"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream


    # Environmental Temperature Status
    - name: environmental_temperature
      mib: 1.3.6.1.4.1.2636.3.1.15
      attributes:
        .1.3.6.1.4.1.2636.3.1.15.1.6: sensor_type
        .1.3.6.1.4.1.2636.3.1.15.1.9: sensor_value
        .1.3.6.1.4.1.2636.3.1.15.1.5: sensor_name
      transformations: ["enrich_device_info","sensor_type_enrichment"]
      append: ["system_info.sys_name"]
      field_exclude: ["mib","index"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream


  # Data Transformations
  data_transformations:

    # Dataset Enrichment
    - name: "enrich_device_info"
      type: enrich
      dataset: "network_device_chassis_dict"
      source_key_columns: ["target_ip"]
      dict_key_columns: ["target_ip"]
      enrich_columns: ["hostname","product_id","vendor"]
      enrich_columns_as: ["device_hostname","device_model","device_vendor"]
      return_empty_columns: "yes"
      enrich_column_defaults: ["Not Available","Not Available", "Not Available"]


    # Sensor Status Label Transformation
    - name: sensor_status_enrichment
      type: starlark
      script: |
        sensor_status_map = {
            1: "unknown",
            2: "empty",
            3: "present",
            4: "ready",
            5: "announceOnline",
            6: "online",
            7: "announceOffline",
            8: "offline",
            9: "diagnostic",
            10: "standby"
        }
        def apply(metric):
            status = metric.fields.get("sensor_status")

            if status == None:
                return metric
          
            metric.fields["sensor_status_label"] = sensor_status_map.get(int(status), "unknown")

            return metric


    # Sensor Type Label Transformation
    - name: sensor_type_enrichment
      type: starlark
      script: |
        sensor_type_map = {
            1: "other",
            2: "clockGenerator",
            3: "flexiblePicConcentrator",
            4: "switchingAndForwardingModule",
            5: "controlBoard",
            6: "routingEngine",
            7: "powerEntryModule",
            8: "chassisMounted",
            9: "fan",
            10: "sensor",
            11: "physicInterfaceCard",
            12: "craftInterfacePanel",
            13: "fan/midplane",
            14: "systemBoard",
            15: "processorBoard",
            16: "portInterfaceCard",
            17: "switchInterfaceBoard",
            18: "adapterCard"
        }
        def apply(metric):
            type = metric.fields.get("sensor_type")

            if type == None:
                return metric

            metric.fields["sensor_type_label"] = sensor_type_map.get(int(type), "unknown")

            return metric

    # Memory Calculation Transformation
    - name: memory_enrichment
      type: starlark
      script: |
        def round(value, decimals):
            factor = 1
            for _ in range(decimals):
                factor *= 10
            return int(value * factor) / factor
        def apply(metric):
            memory_total_mb = metric.fields.get("memory_total")
            memory_usage_pct = metric.fields.get("memory_usage")

            if memory_total_mb == None or memory_usage_pct == None:
                return metric

            # Convert total from MB to bytes
            memory_total_bytes = memory_total_mb * 1024 * 1024

            # Derive used and free in bytes
            memory_used_bytes = int(memory_total_bytes * memory_usage_pct / 100.0)
            memory_free_bytes = int(memory_total_bytes - memory_used_bytes)
 
            # Set the new fields
            metric.fields["memory_total"] = memory_total_bytes
            metric.fields["memory_used"]  = memory_used_bytes
            metric.fields["memory_free"]  = memory_free_bytes

            return metric

    # CPU Fallback Enrichment
    - name: cpu_fallback_enrichment
      type: starlark
      script: |
        def apply(metric):

            cpu_usage = metric.fields.get("cpu_usage")
            cpu_1min = metric.fields.get("cpu_total_1min_rev")
            cpu_5min = metric.fields.get("cpu_total_5min_rev")

            def to_float(val):
                if val == None:
                    return None
                if type(val) == "string":
                    return float(val)
                return val

            cpu_usage = to_float(cpu_usage)
            cpu_1min = to_float(cpu_1min)
            cpu_5min = to_float(cpu_5min)

            # If cpu_usage already populated (5sec), keep it
            if cpu_usage != None:
                return metric

            # Fallback logic
            if cpu_1min != None:
                metric.fields["cpu_usage"] = cpu_1min

            elif cpu_5min != None:
                metric.fields["cpu_usage"] = cpu_5min

            else:
                metric.fields["cpu_usage"] = 0.0

            return metric


'''


