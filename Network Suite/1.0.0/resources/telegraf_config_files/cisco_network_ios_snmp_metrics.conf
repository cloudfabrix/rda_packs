    # NTP Enrichment (Precision + Status Label)
    - name: ntp_status_enrichment
      type: starlark
      script: |
        ntp_status_map = {
            1: "notRunning",
            2: "notSynchronized",
            3: "noneConfigured",
            4: "syncToLocal",
            5: "syncToRefclock",
            6: "syncToRemoteServer",
            99: "unknown"
        }
        def pow2(exp):
            result = 1.0
            if exp >= 0:
                for _ in range(exp):
                    result = result * 2.0
            else:
                for _ in range(-exp):
                    result = result / 2.0
            return result
        def apply(metric):

            # ---- NTP Precision (2^precision seconds → milliseconds) ----
            prec = metric.fields.get("ntp_time_precision")

            if prec != None:
                if type(prec) == "string":
                    prec = int(prec)

                # As per NTP-MIB: precision = 2^prec seconds
                metric.fields["ntp_time_precision_ms"] = pow2(prec) * 1000.0

            # ---- NTP Current Mode Label ----
            ntp_mode = metric.fields.get("ntp_status")

            if ntp_mode != None:
                if type(ntp_mode) == "string":
                    ntp_mode = int(ntp_mode)

                # keep numeric field, add label
                metric.fields["ntp_status_label"] = ntp_status_map.get(
                    ntp_mode,
                    "unknown"
                )

            return metric

    # POE Port Power Metrics Enrichment
    - name: poe_port_enrichment
      type: starlark
      script: |

        # ---- Port Mode Mapping (cpeExtPsePortEnable) ----
        poe_status_map = {
            1: "auto",
            2: "static",
            3: "limit",
            4: "disable"
        }

        def apply(metric):

            # -----------------------------------
            # Port Status Label (keep numeric)
            # -----------------------------------
            status = metric.fields.get("poe_port_status")
            if status != None:
                if type(status) == "string":
                    status = int(status)

                metric.fields["poe_port_status_label"] = poe_status_map.get(
                    status,
                    "unknown"
                )

            # -----------------------------------
            # Convert Power Values (mW → W)
            # -----------------------------------
            power_fields = [
                "poe_max_power",
                "poe_allocated_power",
                "poe_available_power",
                "poe_power_consumption"
            ]

            for field in power_fields:
                value = metric.fields.get(field)

                if value != None:
                    if type(value) == "string":
                        value = float(value)

                    # Convert milliwatts → watts
                    metric.fields[field] = float(value) / 1000.0

            # -----------------------------------
            # Calculate Usage %
            # -----------------------------------
            max_power = metric.fields.get("poe_max_power")
            used_power = metric.fields.get("poe_power_consumption")

            if max_power != None and used_power != None:
                if max_power > 0.0:
                    usage = (used_power / max_power) * 100.0

                    # manual round to 2 decimals
                    factor = 100.0
                    usage = int(usage * factor) / factor

                    metric.fields["poe_usage_percent"] = usage

            return metric
    # CPU Fallback Enrichment
    - name: cpu_fallback_enrichment
      type: starlark
      script: |
        def apply(metric):

            cpu_usage = metric.fields.get("cpu_usage")
            cpu_1min = metric.fields.get("cpu_total_1min_rev")
            cpu_5min = metric.fields.get("cpu_total_5min_rev")

            def to_float(val):
                if val == None:
                    return None
                if type(val) == "string":
                    return float(val)
                return val

            cpu_usage = to_float(cpu_usage)
            cpu_1min = to_float(cpu_1min)
            cpu_5min = to_float(cpu_5min)

            # If cpu_usage already populated (5sec), keep it
            if cpu_usage != None:
                return metric

            # Fallback logic
            if cpu_1min != None:
                metric.fields["cpu_usage"] = cpu_1min

            elif cpu_5min != None:
                metric.fields["cpu_usage"] = cpu_5min

            else:
                metric.fields["cpu_usage"] = 0.0

            return metric

