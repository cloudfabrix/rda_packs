[[inputs.rda_snmp]]
enabled = true
tags = {asset_type = "network_device", vendor = "Arista Networks", kpi_metric = "yes" }
alias = "aos"
input_definition= '''
---
version: "1.0"
collector:
  ## Global Collection Frequency for all SNMP Metrics
  frequency: 300

  # Input Pstream to collect the SNMP Metrics for selected Network Devices
  input_criteria:
    frequency: 600
    pstream: network_access_verification
    query: "auth_state is 'Success' and protocol is 'SNMP' and sys_object_id contains '1.3.6.1.4.1.30065.'"
    # Optional: Specify custom field names from the pstream
    # ip_address_field: "device_ip"      # Field containing IP address (defaults to "host" or "ip_address")
    # cred_field: "auth_credential"      # Field containing credential name (defaults to "snmp_cred" or "used_cred")
    ip_address_field: "ip_address"
    cred_field: "used_cred" 
  connection_properties:
    - name: default
      retries: 2
      timeout: 10

  scalar_fields:
    # Base System Attributes
    - name: system_info
      ##frequency: 60
      fields:
        - name: sys_name
          oid: "SNMPv2-MIB::sysName.0"
        - name: sys_location
          oid: "SNMPv2-MIB::sysLocation.0"

    # Uptime Metric
    - name: uptime
      ##frequency: 60
      fields:
        - name: sys_name
          oid: "SNMPv2-MIB::sysName.0"
        - name: uptime
          oid: "DISMAN-EVENT-MIB::sysUpTimeInstance"
      custom_attributes:
        - name: uptime_conversion
          params:
            source_field: uptime
            output_prefix: uptime_seconds
      transformations: ["enrich_device_info"]
      field_exclude: ["sys_location"]
      output_stream: rda_snmp_metrics

  table_inventories:
    # Interface Inventory
    - name: interface_inventory
      mib: IF-MIB::ifXTable
      ##frequency: 30
      attributes:
        ifDescr: interface_description
        ifAlias: interface_alias
        ifType: interface_type
        ifAdminStatus: admin_status
        ifOperStatus: oper_status
        ifName: "interface_name"
        ifIndex: "interface_index"
      transformations: ["enrich_device_info"]
      append: ["system_info.sys_name"]
      output_stream: 
        name: rda_snmp_network_interfaces_inventory

    # Device Entity Physical Inventory
    - name: entity_physical_inventory
      mib: ENTITY-MIB::entPhysicalTable
      frequency: 300
      attributes:
        entPhysicalDescr: "description"
        entPhysicalClass: "class"
        entPhysicalContainedIn: "contained_in"
        entPhysicalIsFRU: "is_fru"
        entPhysicalName: "entity_name"
        entPhysicalParentRelPos: "parent_rel_pos"
        entPhysicalVendorType: "vendor_type"
        entPhysicalHardwareRev: "hardware_rev"
        entPhysicalFirmwareRev: "firmware_rev"
        entPhysicalSoftwareRev: "software_rev"
        entPhysicalSerialNum: "serial_number"
        entPhysicalModelName: "model"
        ##entPhysicalVendorName: "entity_vendor"
        entPhysicalAlias: "alias"
      append: ["system_info.sys_name"]
      output_stream:
        name: rda_snmp_entity_physical_inventory

  metric_collections:

    # CPU Metrics Collection
    - name: cpu
      ##frequency: 60
      mib: 1.3.6.1.2.1.25.3.3.1 ##HOST-RESOURCES-MIB
      attributes:
        1.3.6.1.2.1.25.3.3.1.2: cpu_total_5sec_rev
      custom_attributes:
        - name: cpu_usage
          params:
            source_field: cpu_total_5sec_rev
            output_field: cpu_usage
      transformations: ["enrich_device_info"]
      append: ["system_info.sys_name"]
      field_exclude: ["mib","index"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

    # Memory Metric Collection
    - name: memory
      ##frequency: 60
      mib: 1.3.6.1.2.1.25.2.3.1
      attributes:
        1.3.6.1.2.1.25.2.3.1.3: memory_name
        1.3.6.1.2.1.25.2.3.1.5: memory_total
        1.3.6.1.2.1.25.2.3.1.6: memory_used
        1.3.6.1.2.1.25.2.3.1.4: memory_units
      transformations: ["enrich_device_info","memory_enrichment"]
      append: ["system_info.sys_name"]
      field_exclude: ["mib","index"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

    # Environmental Sensors
    - name: environmental_sensors
      ##frequency: 60
      mib: 1.3.6.1.2.1.99.1.1.1
      attributes:
        1.3.6.1.2.1.47.1.1.1.1.2: sensor_name
        1.3.6.1.2.1.99.1.1.1.4: sensor_value
        1.3.6.1.2.1.99.1.1.1.5: sensor_status
        1.3.6.1.2.1.99.1.1.1.1: sensor_type
        1.3.6.1.2.1.99.1.1.1.6: sensor_units
      transformations: ["enrich_device_info","sensor_status_enrichment"]
      append: ["system_info.sys_name"]
      field_exclude: ["mib","index"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

    # Interface Metrics Collection 
    - name: interface
      ##frequency: 60
      mib: IF-MIB::ifTable
      index_field: if_index
      #pstream: rdaf_telegraf_interface
      #filter_query: "admin_status == 1 and oper_status == 1"
      attributes:
        IF-MIB::ifHCInOctets: in_octets
        IF-MIB::ifHCOutOctets: out_octets
        IF-MIB::ifDescr: interface_description
        IF-MIB::ifAlias: interface_alias
        IF-MIB::ifHighSpeed: high_speed
        IF-MIB::ifOperStatus: oper_status
        IF-MIB::ifAdminStatus: admin_status
        IF-MIB::ifIndex: interface_index
        IF-MIB::ifType: interface_type
        IF-MIB::ifLastChange: last_change
        IF-MIB::ifInErrors: in_errors
        IF-MIB::ifOutErrors: out_errors
        IF-MIB::ifInDiscards: in_discards
        IF-MIB::ifOutDiscards: out_discards
        IF-MIB::ifSpeed: interface_speed
      custom_attributes:
        - name: interface_utilization
          params:
            speed_field: high_speed
            in_octets_field: in_octets
            out_octets_field: out_octets
        - name: interface_status_label
          params:
            admin_status_field: admin_status
            oper_status_field: oper_status
            admin_output_field: admin_status_label
            oper_output_field: oper_status_label
      transformations: ["enrich_device_info"]
      append: ["system_info.sys_name"]
      field_exclude: ["mib","*_rate","*_time_delta","index","interface_alias"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

    # Interface CRC Errors Metric Collection
    - name: interface_crc_errors
      ##frequency: 30
      mib: 1.3.6.1.2.1.10.7.2.1
      index_field: 1.3.6.1.2.1.10.7.2.1.1
      attributes:
        1.3.6.1.2.1.10.7.2.1.3: crc_errors
        1.3.6.1.2.1.10.7.2.1.2: alignment_errors
        1.3.6.1.2.1.10.7.2.1.13: frame_too_longs
        1.3.6.1.2.1.10.7.2.1.18: symbol_errors
      transformations: ["enrich_device_info","interface_description"]
      append: ["system_info.sys_name"]
      field_exclude: ["mib","index","*_rate","*_time_delta"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

    # OSPF Metics Collection
    # OSPF Neighbor Metrics
    - name: ospf_neighbors
      mib: 1.3.6.1.2.1.14.10
      attributes:
        # Neighbor Identity
        1.3.6.1.2.1.14.10.1.1: ospf_neighbor_ip_address
        1.3.6.1.2.1.14.10.1.3: ospf_neighbor_router_id
        1.3.6.1.2.1.14.10.1.7: ospf_neighbor_events
        1.3.6.1.2.1.14.10.1.6: ospf_neighbor_state
      tags:
        protocol: ospf
      transformations:
        - enrich_device_info
        - ospf_neighbor_enrichment
      append: ["system_info.sys_name"]
      field_exclude: ["mib","index","*_rate","*_time_delta"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

    # OSPF Interface Metrics
    - name: ospf_interfaces
      mib: 1.3.6.1.2.1.14.7
      attributes:
        1.3.6.1.2.1.14.7.1.15: ospf_interface_events
        1.3.6.1.2.1.14.7.1.12: ospf_interface_state
      tags:
        protocol: ospf
      transformations:
        - enrich_device_info
        - ospf_interface_status_enrichment
      append: ["system_info.sys_name"]
      field_exclude: ["mib","*_rate","*_time_delta"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

    # OSPF Service Status
    - name: ospf_status
      mib: 1.3.6.1.2.1.14.1
      attributes:
        1.3.6.1.2.1.14.1.2: ospf_admin_status
      tags:
        protocol: ospf
      transformations:
        - enrich_device_info
        - ospf_admin_status_enrichment
      append: ["system_info.sys_name"]
      field_exclude: ["mib","index"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream
      
    # BGP Metics Collection

    - name: bgp_peers
      mib: 1.3.6.1.2.1.15.3
      attributes:
        1.3.6.1.2.1.15.3.1.1: bgp_peer_identifier
        1.3.6.1.2.1.15.3.1.2: bgp_peer_state
        1.3.6.1.2.1.15.3.1.3: bgp_peer_admin_status
        1.3.6.1.2.1.15.3.1.5: bgp_peer_local_ip
        1.3.6.1.2.1.15.3.1.6: bgp_peer_local_port
        1.3.6.1.2.1.15.3.1.7: bgp_peer_remote_ip
        1.3.6.1.2.1.15.3.1.8: bgp_peer_remote_port
        1.3.6.1.2.1.15.3.1.9: bgp_peer_remote_as
        1.3.6.1.2.1.15.3.1.10: bgp_peer_in_updates
        1.3.6.1.2.1.15.3.1.11: bgp_peer_out_updates
        1.3.6.1.2.1.15.3.1.12: bgp_peer_in_messages
        1.3.6.1.2.1.15.3.1.13: bgp_peer_out_messages
        1.3.6.1.2.1.15.3.1.16: bgp_peer_uptime
      tags:
        protocol: bgp
      transformations: ["enrich_device_info","bgp_peer_enrichment"]
      append: ["system_info.sys_name"]
      field_exclude: ["mib","*_rate","*_time_delta"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream
 
  # Data Transformations 
  data_transformations:

    # Dataset Enrichment
    - name: "enrich_device_info"
      type: enrich
      dataset: "network_device_chassis_dict"
      source_key_columns: ["target_ip"]
      dict_key_columns: ["target_ip"]
      enrich_columns: ["hostname","product_id","vendor"]
      enrich_columns_as: ["device_hostname","device_model","device_vendor"]
      return_empty_columns: "yes"
      enrich_column_defaults: ["Not Available","Not Available", "Not Available"]

    # Dataset Enrichment
    - name: "interface_description"
      type: enrich
      dataset: "interface_ethernet_inventory"
      source_key_columns: ["target_ip","index"]
      dict_key_columns: ["target_ip","index"]
      enrich_columns: ["interface_description"]
      enrich_columns_as: ["interface_description"]
      return_empty_columns: true
      enrich_column_defaults: ["Not Available"]

    # Sensor Status Label Transformation
    - name: sensor_status_enrichment
      type: starlark
      script: |
        # ENTITY-SENSOR-MIB sensor types
        sensor_type_map = {
            1: "other",
            2: "unknown",
            3: "voltsAC",
            4: "voltsDC",
            5: "amperes",
            6: "watts",
            7: "hertz",
            8: "celsius",
            9: "percentRH",
            10: "rpm",
            11: "cmm",
            12: "truthvalue"
        }

        # Arista sensor status (ENTITY-SENSOR-MIB)
        sensor_status_map = {
            1: "ok",
            2: "unavailable",
            3: "nonoperational"
        }

        def apply(metric):

            # ---------- Sensor Type ----------
            sensor_type_val = metric.fields.get("sensor_type")
            sensor_type_label = None

            if sensor_type_val != None:
                if type(sensor_type_val) == "string":
                    sensor_type_val = int(sensor_type_val)

                sensor_type_label = sensor_type_map.get(sensor_type_val, "unknown")

                # keep decoded type as field (optional but useful)
                metric.fields["sensor_type_label"] = sensor_type_label

            # ---------- Sensor Status ----------
            sensor_status_val = metric.fields.get("sensor_status")

            if sensor_status_val != None:
                if type(sensor_status_val) == "string":
                    sensor_status_val = int(sensor_status_val)

                # KEEP numeric sensor_status
                metric.fields["sensor_status_label"] = sensor_status_map.get(
                    sensor_status_val,
                    "unknown"
                )

            # ---------- Sensor Value Normalization ----------
            sensor_value = metric.fields.get("sensor_value")

            if sensor_value != None:
                if type(sensor_value) == "string":
                    sensor_value = float(sensor_value)

                # Celsius (tenths)
                if sensor_type_label == "celsius":
                    metric.fields["sensor_value"] = sensor_value / 10.0

                # Volts (mV → V)
                elif sensor_type_label in ["voltsAC", "voltsDC"]:
                    metric.fields["sensor_value"] = sensor_value / 1000.0

                # Amperes (mA → A)
                elif sensor_type_label == "amperes":
                    metric.fields["sensor_value"] = sensor_value / 1000.0

                # Watts (tenths)
                elif sensor_type_label == "watts":
                    metric.fields["sensor_value"] = sensor_value / 1000.0

                # dB / optical (hundredths)
                elif sensor_type_label == "other":
                    metric.fields["sensor_value"] = sensor_value / 100.0

            return metric

    #Memory Calculation Transformation
    - name: memory_enrichment
      type: starlark
      script: |
        def round(value, decimals):
            factor = 1
            for _ in range(decimals):
                factor *= 10
            return int(value * factor) / factor
        def apply(metric):
            total_units = metric.fields.get("memory_total")
            used_units = metric.fields.get("memory_used")
            free_units = metric.fields.get("memory_free")
            units = metric.fields.get("memory_units")

            if units == None or units == 0:
                units = 1
            units = float(units)

            if total_units != None and used_units != None:
                total_bytes = float(total_units) * units
                used_bytes = float(used_units) * units
                free_bytes = total_bytes - used_bytes
                metric.fields["memory_total"] = int(total_bytes)
                metric.fields["memory_used"] = int(used_bytes)
                metric.fields["memory_free"] = int(free_bytes)
                if total_bytes > 0:
                    metric.fields["memory_usage"] = round((used_bytes / total_bytes) * 100.0, 2)
                else:
                    metric.fields["memory_usage"] = 0.0
            elif total_units != None and free_units != None:
                total_bytes = float(total_units) * units
                free_bytes = float(free_units) * units
                used_bytes = total_bytes - free_bytes
                metric.fields["memory_total"] = int(total_bytes)
                metric.fields["memory_used"] = int(used_bytes)
                metric.fields["memory_free"] = int(free_bytes)
                if total_bytes > 0:
                    metric.fields["memory_usage"] = round((used_bytes / total_bytes) * 100.0, 2)
                else:
                    metric.fields["memory_usage"] = 0.0
            elif used_units != None and free_units != None:
                used_bytes = float(used_units) * units
                free_bytes = float(free_units) * units
                total_bytes = used_bytes + free_bytes
                metric.fields["memory_total"] = int(total_bytes)
                metric.fields["memory_used"] = int(used_bytes)
                metric.fields["memory_free"] = int(free_bytes)
                if total_bytes > 0:
                    metric.fields["memory_usage"] = round((used_bytes / total_bytes) * 100.0, 2)
                else:
                    metric.fields["memory_usage"] = 0.0
            return metric

    # OSPF Neighbors Status Enrichment
    - name: ospf_neighbor_enrichment
      type: starlark
      script: |
        # -------------------------------
        # OSPF Neighbor State (OSPF-MIB)
        # -------------------------------
        ospf_neighbor_state_map = {
            1: "down",
            2: "attempt",
            3: "init",
            4: "twoWay",
            5: "exchangeStart",
            6: "exchange",
            7: "loading",
            8: "full"
        }

        def apply(metric):

            # ---- Neighbor State ----
            val = metric.fields.get("ospf_neighbor_state")
            if val != None:
                if type(val) == "string":
                    val = int(val)
                metric.fields["ospf_neighbor_state_label"] = \
                    ospf_neighbor_state_map.get(val, "unknown")

            return metric

    # OSPF Service Status Enrichment
    - name: ospf_admin_status_enrichment
      type: starlark
      script: |
        # -------------------------------
        # OSPF Admin Status (OSPF-MIB)
        # -------------------------------
        ospf_admin_status_map = {
            1: "enabled",
            2: "disabled"
        }

        def apply(metric):

            # ---- Admin Status ----
            val = metric.fields.get("ospf_admin_status")
            if val != None:
                if type(val) == "string":
                    val = int(val)
                metric.fields["ospf_admin_status_label"] = \
                    ospf_admin_status_map.get(val, "unknown")

            return metric

    # OSPF Interfaces Status Enrichment
    - name: ospf_interface_status_enrichment
      type: starlark
      script: |
        # -------------------------------
        # OSPF Interface State (OSPF-MIB)
        # -------------------------------
        ospf_interface_state_map = {
            1: "down",
            2: "loopback",
            3: "waiting",
            4: "pointToPoint",
            5: "designatedRouter",
            6: "backupDesignatedRouter",
            7: "otherDesignatedRouter"
        }

        def apply(metric):

            # ---- Interface State ----
            val = metric.fields.get("ospf_interface_state")
            if val != None:
                if type(val) == "string":
                    val = int(val)
                metric.fields["ospf_interface_state_label"] = \
                    ospf_interface_state_map.get(val, "unknown")

            return metric

    # BGP Peers Metric Enrichment
    - name: bgp_peer_enrichment
      type: starlark
      script: |
        # ---- BGP Peer State Mapping ----
        bgp_state_map = {
            1: "idle",
            2: "connect",
            3: "active",
            4: "openSent",
            5: "openConfirm",
            6: "established"
        }

        # ---- BGP Admin Status Mapping ----
        bgp_admin_status_map = {
            1: "stop",
            2: "start"
        }

        def apply(metric):
            # ---- BGP Peer State Label ----
            state_val = metric.fields.get("bgp_peer_state")
            if state_val != None:
                if type(state_val) == "string":
                    state_val = int(state_val)

                metric.fields["bgp_peer_state_label"] = bgp_state_map.get(
                    state_val,
                    "unknown"
                )

            # ---- BGP Admin Status Label ----
            admin_val = metric.fields.get("bgp_peer_admin_status")
            if admin_val != None:
                if type(admin_val) == "string":
                    admin_val = int(admin_val)

                metric.fields["bgp_peer_admin_status_label"] = bgp_admin_status_map.get(
                    admin_val,
                    "unknown"
                )

            return metric


'''
