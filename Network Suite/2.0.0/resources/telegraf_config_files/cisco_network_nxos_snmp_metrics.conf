[[inputs.rda_snmp]]
enabled = true
tags = {asset_type = "network_device", vendor = "Cisco", kpi_metric = "yes" }
alias = "cisco_nx_os"
input_definition= '''
---
version: "1.0"
collector:
  ## Global Collection Frequency for all SNMP Metrics
  frequency: 1800

  # Input Pstream to collect the SNMP Metrics for selected Network Devices
  input_criteria:
    frequency: 600
    pstream: network_access_verification
    query: "auth_state is 'Success' and protocol is 'SNMP' and sys_object_id contains '1.3.6.1.4.1.9.12.3.1.3'"
    # Optional: Specify custom field names from the pstream
    # ip_address_field: "device_ip"      # Field containing IP address (defaults to "host" or "ip_address")
    # cred_field: "auth_credential"      # Field containing credential name (defaults to "snmp_cred" or "used_cred")
    ip_address_field: "ip_address"
    cred_field: "used_cred" 
  connection_properties:
    - name: default
      retries: 2
      timeout: 10

  scalar_fields:
    # Base System Attributes
    - name: system_info
      ##frequency: 60
      fields:
        - name: sys_name
          oid: "SNMPv2-MIB::sysName.0"
        - name: sys_location
          oid: "SNMPv2-MIB::sysLocation.0"
    
    # Uptime Metric
    - name: uptime
      ##frequency: 60
      fields:
        - name: sys_name
          oid: "SNMPv2-MIB::sysName.0"
        - name: uptime
          oid: "DISMAN-EVENT-MIB::sysUpTimeInstance"
      custom_attributes:
        - name: uptime_conversion
          params:
            source_field: uptime
            output_prefix: uptime_seconds
      transformations: ["enrich_device_info"]
      output_stream: rda_snmp_metrics
     
  table_inventories:    
    # Interface Inventory
    - name: interface_inventory
      mib: IF-MIB::ifXTable
      instance_oid: ifIndex
      ##frequency: 30
      attributes:
        ifDescr: "interface_description"
        ifAlias: "interface_alias"
        ifType: "interface_type"
        ifAdminStatus: "admin_status"
        ifOperStatus: "oper_status"
        ifName: "interface_name"
        ifIndex: "interface_index"
      custom_attributes:
        - name: interface_status_label
          params:
            admin_status_field: admin_status
            oper_status_field: oper_status
            admin_output_field: admin_status_label
            oper_output_field: oper_status_label
      transformations: ["enrich_device_info"]
      append: ["system_info.sys_name"]
      output_stream: 
        name: rda_snmp_network_interfaces_inventory

    # Device Entity Physical Inventory
    - name: entity_physical_inventory
      mib: ENTITY-MIB::entPhysicalTable
      frequency: 30
      attributes:
        entPhysicalDescr: "description"
        entPhysicalClass: "class"
        entPhysicalContainedIn: "contained_in"
        entPhysicalIsFRU: "is_fru"
        entPhysicalName: "entity_name"
        entPhysicalParentRelPos: "parent_rel_pos"
        entPhysicalVendorType: "vendor_type"
        entPhysicalHardwareRev: "hardware_rev"
        entPhysicalFirmwareRev: "firmware_rev"
        entPhysicalSoftwareRev: "software_rev"
        entPhysicalSerialNum: "serial_number"
        entPhysicalModelName: "model"
        ##entPhysicalVendorName: "entity_vendor"
        entPhysicalAlias: "alias"
      append: ["system_info.sys_name"]
      output_stream:
        name: rda_snmp_entity_physical_inventory

  metric_collections:

    # CPU Metrics Collection
    - name: "cpu"
      ##frequency: 30
      mib: .1.3.6.1.4.1.9.9.109.1.1.1.1
      attributes:
        .1.3.6.1.4.1.9.9.109.1.1.1.1.6: "cpu_total_5sec_rev"
        .1.3.6.1.4.1.9.9.109.1.1.1.1.7: "cpu_total_1min_rev"
        .1.3.6.1.4.1.9.9.109.1.1.1.1.8: "cpu_total_5min_rev"
      custom_attributes:
        - name: cpu_usage
          params:
            source_field: cpu_total_5sec_rev
            output_field: cpu_usage
      transformations: ["enrich_device_info","cpu_fallback_enrichment"]
      append: ["system_info.sys_name"]
      output_stream: 
        name: rda_snmp_metrics
        type: pstream

    # Memory Metric Collection - NX-OS
    - name: "memory"
      ##frequency: 60
      mib: .1.3.6.1.4.1.9.9.109
      attributes:
        .1.3.6.1.4.1.9.9.109.1.1.1.1.12: "memory_used"
        .1.3.6.1.4.1.9.9.109.1.1.1.1.13: "memory_free"
      tags:
        memory_name: System
      transformations: ["enrich_device_info","memory_enrichment"]
      append: ["system_info.sys_name"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

    # Interface Metrics Collection    
    - name: interface
      ##frequency: 90
      mib: IF-MIB::ifTable
      index_field: if_index
      #pstream: rdaf_telegraf_interface
      #filter_query: ""
      attributes:
        IF-MIB::ifHCInOctets: in_octets
        IF-MIB::ifHCOutOctets: out_octets
        IF-MIB::ifDescr: interface_description
        IF-MIB::ifAlias: interface_alias
        IF-MIB::ifHighSpeed: high_speed
        IF-MIB::ifOperStatus: oper_status
        IF-MIB::ifAdminStatus: admin_status
        IF-MIB::ifIndex: interface_index
        IF-MIB::ifType: interface_type
        IF-MIB::ifLastChange: last_change
        IF-MIB::ifInErrors: in_errors
        IF-MIB::ifOutErrors: out_errors
        IF-MIB::ifInDiscards: in_discards
        IF-MIB::ifOutDiscards: out_discards
        IF-MIB::ifSpeed: interface_speed
      custom_attributes:
        - name: interface_utilization
          params:
            speed_field: high_speed
            in_octets_field: in_octets
            out_octets_field: out_octets
        - name: interface_status_label
          params:
            admin_status_field: admin_status
            oper_status_field: oper_status
            admin_output_field: admin_status_label
            oper_output_field: oper_status_label
      transformations: ["enrich_device_info"]
      append: ["system_info.sys_name"]
      ##field_exclude: ["in_discards_time_delta","*_rate"]
      output_stream: 
        name: rda_snmp_metrics
        type: pstream

    # Environmental Sensors
    - name: environmental_sensors
      ##frequency: 60
      mib: .1.3.6.1.4.1.9.9.91
      attributes:
        #1.3.6.1.2.1.47.1.1.1.1.2: sensor_name
        .1.3.6.1.4.1.9.9.91.1.1.1.1.4: sensor_value
        .1.3.6.1.4.1.9.9.91.1.1.1.1.5: sensor_status
        .1.3.6.1.4.1.9.9.91.1.1.1.1.1: sensor_type
        .1.3.6.1.4.1.9.9.91.1.1.1.1.2: sensor_units
      transformations: ["enrich_device_info","sensor_status_enrichment","entity_physical_sensors"]
      append: ["system_info.sys_name"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

    # Interface CRC Errors Metric Collection
    - name: interface_crc_errors
      ##frequency: 30
      mib: 1.3.6.1.2.1.10.7.2.1
      index_field: 1.3.6.1.2.1.10.7.2.1.1
      attributes:
        IF-MIB::ifDescr: interface_description
        1.3.6.1.2.1.10.7.2.1.3: crc_errors
        1.3.6.1.2.1.10.7.2.1.2: alignment_errors
        1.3.6.1.2.1.10.7.2.1.13: frame_too_longs
        1.3.6.1.2.1.10.7.2.1.18: symbol_errors
      transformations: ["enrich_device_info"]
      append: ["system_info.sys_name"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

    # NTP Metrics
    - name: ntp
      attributes:
        1.3.6.1.2.1.197.1.2.1.0: ntp_status
        1.3.6.1.2.1.197.1.1.6.0: ntp_time_precision
      append: ["system_info.sys_name"]
      transformations: ["enrich_device_info","ntp_status_enrichment"]
      output_stream: rda_snmp_metrics

  # Data Transformations
  data_transformations:

    # Dataset Enrichment
    - name: "enrich_device_info"
      type: enrich
      dataset: "network_device_chassis_dict"
      source_key_columns: ["target_ip"]
      dict_key_columns: ["target_ip"]
      enrich_columns: ["hostname","product_id","vendor","sw_type"]
      enrich_columns_as: ["device_hostname","device_model","device_vendor","device_sw_type"]
      return_empty_columns: true
      enrich_column_defaults: ["Not Available","Not Available", "Not Available", "Not Avaiable"]

    # Dataset Enrichment
    - name: "entity_physical_sensors"
      type: enrich
      dataset: "rda_snmp_entity_physical_inventory"
      source_key_columns: ["target_ip","index"]
      dict_key_columns: ["target_ip","index"]
      enrich_columns: ["entity_name","class_label"]
      enrich_columns_as: ["sensor_name","class_label"]
      return_empty_columns: true
      enrich_column_defaults: ["Not Available","Not Available"]


    # Sensor Status Label Transformation
    - name: sensor_status_enrichment
      type: starlark
      script: |
        # CISCO-ENTITY-SENSOR-MIB sensor types
        sensor_type_map = {
            1: "other",
            2: "unknown",
            3: "voltsAC",
            4: "voltsDC",
            5: "amperes",
            6: "watts",
            7: "hertz",
            8: "celsius",
            9: "percentRH",
            10: "rpm",
            11: "cmm",
            12: "truthvalue",
            13: "specialEnum",
            14: "dBm",
            15: "dB"
        }

        # CISCO-ENTITY-SENSOR-MIB sensor units
        sensor_units_map = {
            1: "yocto",
            2: "zepto",
            3: "atto",
            4: "femto",
            5: "pico",
            6: "nano",
            7: "micro",
            8: "milli",
            9: "units",
            10: "kilo",
            11: "mega",
            12: "giga",
            13: "tera",
            14: "exa",
            15: "peta",
            16: "zetta",
            17: "yotta"
        }

        # Cisco NXOS sensor status (CISCO-ENTITY-SENSOR-MIB)
        sensor_status_map = {
            1: "ok",
            2: "unavailable",
            3: "nonoperational"
        }

        def apply(metric):

            # ---------- Sensor Type ----------
            sensor_type_val = metric.fields.get("sensor_type")
            sensor_type_label = None

            if sensor_type_val != None:
                if type(sensor_type_val) == "string":
                    sensor_type_val = int(sensor_type_val)

                sensor_type_label = sensor_type_map.get(sensor_type_val, "unknown")

                # keep decoded type as field (optional but useful)
                metric.fields["sensor_type_label"] = sensor_type_label

            # ---------- Sensor Status ----------
            sensor_status_val = metric.fields.get("sensor_status")

            if sensor_status_val != None:
                if type(sensor_status_val) == "string":
                    sensor_status_val = int(sensor_status_val)

                # KEEP numeric sensor_status
                metric.fields["sensor_status_label"] = sensor_status_map.get(
                    sensor_status_val,
                    "unknown"
                )

            # ---------- Sensor Units ----------
            sensor_units_val = metric.fields.get("sensor_units")

            if sensor_units_val != None:
                if type(sensor_units_val) == "string":
                    sensor_units_val = int(sensor_units_val)

                # KEEP numeric sensor_units
                metric.fields["sensor_units_label"] = sensor_units_map.get(
                    sensor_units_val,
                    "unknown"
                )

            # ---------- Sensor Value Normalization ----------
            sensor_value = metric.fields.get("sensor_value")

            if sensor_value != None:
                if type(sensor_value) == "string":
                    sensor_value = float(sensor_value)

                # Celsius (tenths)
                if sensor_type_label == "celsius" and sensor_units_val == 9:
                    metric.fields["sensor_value"] = sensor_value

                # Celsius (tenths)
                if sensor_type_label == "celsius" and sensor_units_val == 8:
                    metric.fields["sensor_value"] = sensor_value / 1000.0

                # Volts (mV → V)
                elif sensor_type_label in ["voltsAC", "voltsDC"]:
                    metric.fields["sensor_value"] = sensor_value / 1000.0

                # Amperes (mA → A)
                elif sensor_type_label == "amperes" and sensor_units_val == 7:
                    metric.fields["sensor_value"] = sensor_value / 100000.0
                
                # Amperes (mA → A)
                elif sensor_type_label == "amperes" and sensor_units_val == 8:
                    metric.fields["sensor_value"] = sensor_value / 1000.0

                # Watts (tenths)
                elif sensor_type_label == "watts":
                    metric.fields["sensor_value"] = sensor_value / 10.0

                # dBm / optical (hundredths)
                elif sensor_type_label == "dBm":
                    metric.fields["sensor_value"] = sensor_value / 100.0

                # dB / optical (hundredths)
                elif sensor_type_label == "other":
                    metric.fields["sensor_value"] = sensor_value / 100.0

            return metric


    # Memory Calculation Transformation
    - name: memory_enrichment
      type: starlark
      script: |
        def round(value, decimals):
            factor = 1
            for _ in range(decimals):
                factor *= 10
            return int(value * factor) / factor
        def apply(metric):
            total_units = metric.fields.get("memory_total")
            used_units = metric.fields.get("memory_used")
            free_units = metric.fields.get("memory_free")
            memory_type = metric.tags.get("memory_name")
            units = metric.fields.get("memory_units")

            if memory_type == "System":
                units = 1024

            if units == None or units == 0:
                units = 1

            units = float(units)

            if total_units != None and used_units != None:
                total_bytes = float(total_units) * units
                used_bytes = float(used_units) * units
                free_bytes = total_bytes - used_bytes
                metric.fields["memory_total"] = int(total_bytes)
                metric.fields["memory_used"] = int(used_bytes)
                metric.fields["memory_free"] = int(free_bytes)
                if total_bytes > 0:
                    metric.fields["memory_usage"] = round((used_bytes / total_bytes) * 100.0, 2)
                else:
                    metric.fields["memory_usage"] = 0.0
            elif total_units != None and free_units != None:
                total_bytes = float(total_units) * units
                free_bytes = float(free_units) * units
                used_bytes = total_bytes - free_bytes
                metric.fields["memory_total"] = int(total_bytes)
                metric.fields["memory_used"] = int(used_bytes)
                metric.fields["memory_free"] = int(free_bytes)
                if total_bytes > 0:
                    metric.fields["memory_usage"] = round((used_bytes / total_bytes) * 100.0, 2)
                else:
                    metric.fields["memory_usage"] = 0.0
            elif used_units != None and free_units != None:
                used_bytes = float(used_units) * units
                free_bytes = float(free_units) * units
                total_bytes = used_bytes + free_bytes
                metric.fields["memory_total"] = int(total_bytes)
                metric.fields["memory_used"] = int(used_bytes)
                metric.fields["memory_free"] = int(free_bytes)
                if total_bytes > 0:
                    metric.fields["memory_usage"] = round((used_bytes / total_bytes) * 100.0, 2)
                else:
                    metric.fields["memory_usage"] = 0.0
            return metric

    # NTP Enrichment (Precision + Status Label)
    - name: ntp_status_enrichment
      type: starlark
      script: |
        ntp_status_map = {
            1: "notRunning",
            2: "notSynchronized",
            3: "noneConfigured",
            4: "syncToLocal",
            5: "syncToRefclock",
            6: "syncToRemoteServer",
            99: "unknown"
        }
        def pow2(exp):
            result = 1.0
            if exp >= 0:
                for _ in range(exp):
                    result = result * 2.0
            else:
                for _ in range(-exp):
                    result = result / 2.0
            return result
        def apply(metric):

            # ---- NTP Precision (2^precision seconds → milliseconds) ----
            prec = metric.fields.get("ntp_time_precision")

            if prec != None:
                if type(prec) == "string":
                    prec = int(prec)

                # As per NTP-MIB: precision = 2^prec seconds
                metric.fields["ntp_time_precision_ms"] = pow2(prec) * 1000.0

            # ---- NTP Current Mode Label ----
            ntp_mode = metric.fields.get("ntp_status")

            if ntp_mode != None:
                if type(ntp_mode) == "string":
                    ntp_mode = int(ntp_mode)

                # keep numeric field, add label
                metric.fields["ntp_status_label"] = ntp_status_map.get(
                    ntp_mode,
                    "unknown"
                )

            return metric

    # POE Interfaces Enrichment
    - name: poe_enrichment
      type: starlark
      script: |

        # ---- Port Mode Mapping (cpeExtPsePortEnable) ----
        poe_status_map = {
            1: "auto",
            2: "static",
            3: "limit",
            4: "disable"
        }

        def apply(metric):

            # -----------------------------------
            # Port Status Label (keep numeric)
            # -----------------------------------
            status = metric.fields.get("poe_port_status")
            if status != None:
                if type(status) == "string":
                    status = int(status)

                metric.fields["poe_port_status_label"] = poe_status_map.get(
                    status,
                    "unknown"
                )

            # -----------------------------------
            # Convert Power Values (mW → W)
            # -----------------------------------
            power_fields = [
                "poe_max_power",
                "poe_allocated_power",
                "poe_available_power",
                "poe_power_consumption"
            ]

            for field in power_fields:
                value = metric.fields.get(field)

                if value != None:
                    if type(value) == "string":
                        value = float(value)

                    # Convert milliwatts → watts
                    metric.fields[field] = float(value) / 1000.0

            # -----------------------------------
            # Calculate Usage %
            # -----------------------------------
            max_power = metric.fields.get("poe_max_power")
            used_power = metric.fields.get("poe_power_consumption")

            if max_power != None and used_power != None:
                if max_power > 0.0:
                    usage = (used_power / max_power) * 100.0

                    # manual round to 2 decimals
                    factor = 100.0
                    usage = int(usage * factor) / factor

                    metric.fields["poe_usage_percent"] = usage

            return metric
    - name: cpu_fallback_enrichment
      type: starlark
      script: |
        def apply(metric):

            cpu_usage = metric.fields.get("cpu_usage")
            cpu_1min = metric.fields.get("cpu_total_1min_rev")
            cpu_5min = metric.fields.get("cpu_total_5min_rev")

            def to_float(val):
                if val == None:
                    return None
                if type(val) == "string":
                    return float(val)
                return val

            cpu_usage = to_float(cpu_usage)
            cpu_1min = to_float(cpu_1min)
            cpu_5min = to_float(cpu_5min)

            # If cpu_usage already populated (5sec), keep it
            if cpu_usage != None:
                return metric

            # Fallback logic
            if cpu_1min != None:
                metric.fields["cpu_usage"] = cpu_1min

            elif cpu_5min != None:
                metric.fields["cpu_usage"] = cpu_5min

            else:
                metric.fields["cpu_usage"] = 0.0

            return metric
'''
