[[inputs.rda_snmp]]
enabled = true
tags = {asset_type = "network_device", vendor = "Cisco", kpi_metric = "yes" }
alias = "viptela"
input_definition= '''
---
version: "1.0"
collector:
  ## Global Collection Frequency for all SNMP Metrics
  frequency: 300

  # Input Pstream to collect the SNMP Metrics for selected Network Devices
  input_criteria:
    frequency: 600
    pstream: network_access_verification
    query: "auth_state is 'Success' and protocol is 'SNMP' and sys_object_id contains '1.3.6.1.4.1.41916'"
    # Optional: Specify custom field names from the pstream
    # ip_address_field: "device_ip"      # Field containing IP address (defaults to "host" or "ip_address")
    # cred_field: "auth_credential"      # Field containing credential name (defaults to "snmp_cred" or "used_cred")
    ip_address_field: "ip_address"
    cred_field: "used_cred" 
  connection_properties:
    - name: default
      retries: 2
      timeout: 10

  scalar_fields:
    # Base System Attributes
    - name: system_info
      ##frequency: 60
      fields:
        - name: sys_name
          oid: "SNMPv2-MIB::sysName.0"
        - name: sys_location
          oid: "SNMPv2-MIB::sysLocation.0"
    
    # Uptime Metric
    - name: uptime
      ##frequency: 60
      fields:
        - name: sys_name
          oid: "SNMPv2-MIB::sysName.0"
        - name: uptime
          oid: "DISMAN-EVENT-MIB::sysUpTimeInstance"
      custom_attributes:
        - name: uptime_conversion
          params:
            source_field: uptime
            output_prefix: uptime_seconds
      transformations: ["enrich_device_info"]
      output_stream: rda_snmp_metrics
     
  table_inventories:    
    # Interface Inventory
    - name: interface_inventory
      mib: IF-MIB::ifXTable
      instance_oid: ifIndex
      frequency: 3600
      attributes:
        ifDescr: "interface_description"
        ifAlias: "interface_alias"
        ifType: "interface_type"
        ifAdminStatus: "admin_status"
        ifOperStatus: "oper_status"
        ifName: "interface_name"
        ifIndex: "interface_index"
      custom_attributes:
        - name: interface_status_label
          params:
            admin_status_field: admin_status
            oper_status_field: oper_status
            admin_output_field: admin_status_label
            oper_output_field: oper_status_label
      transformations: ["enrich_device_info"]
      append: ["system_info.sys_name"]
      output_stream: 
        name: rda_snmp_network_interfaces_inventory

    # Device Entity Physical Inventory
    - name: entity_physical_inventory
      mib: ENTITY-MIB::entPhysicalTable
      frequency: 3600
      attributes:
        entPhysicalDescr: "description"
        entPhysicalClass: "class"
        entPhysicalContainedIn: "contained_in"
        entPhysicalIsFRU: "is_fru"
        entPhysicalName: "entity_name"
        entPhysicalParentRelPos: "parent_rel_pos"
        entPhysicalVendorType: "vendor_type"
        entPhysicalHardwareRev: "hardware_rev"
        entPhysicalFirmwareRev: "firmware_rev"
        entPhysicalSoftwareRev: "software_rev"
        entPhysicalSerialNum: "serial_number"
        entPhysicalModelName: "model"
        ##entPhysicalVendorName: "entity_vendor"
        entPhysicalAlias: "alias"
      append: ["system_info.sys_name"]
      output_stream:
        name: rda_snmp_entity_physical_inventory

  metric_collections:

    # CPU Metrics Collection
    - name: "cpu"
      ##frequency: 30
      mib: .1.3.6.1.4.1.41916.11
      attributes:
        1.3.6.1.4.1.41916.11.1.10: "cpu_total_5sec_rev"
      custom_attributes:
        - name: cpu_usage
          params:
            source_field: cpu_total_5sec_rev
            output_field: cpu_usage
      transformations: ["enrich_device_info"]
      append: ["system_info.sys_name"]
      output_stream: 
        name: rda_snmp_metrics
        type: pstream

    # Memory Metric Collection
    - name: "memory"
      ##frequency: 60
      mib: .1.3.6.1.4.1.9.9.109
      attributes:
        1.3.6.1.4.1.41916.11.1.18: "memory_used"
        1.3.6.1.4.1.41916.11.1.17: "memory_total"
      tags:
        memory_name: System
      transformations: ["enrich_device_info","memory_enrichment"]
      append: ["system_info.sys_name"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

    # Interface Metrics Collection    
    - name: interface
      ##frequency: 90
      mib: IF-MIB::ifTable
      index_field: if_index
      #pstream: rdaf_telegraf_interface
      #filter_query: ""
      attributes:
        IF-MIB::ifHCInOctets: in_octets
        IF-MIB::ifHCOutOctets: out_octets
        IF-MIB::ifDescr: interface_description
        IF-MIB::ifAlias: interface_alias
        IF-MIB::ifHighSpeed: high_speed
        IF-MIB::ifOperStatus: oper_status
        IF-MIB::ifAdminStatus: admin_status
        IF-MIB::ifIndex: interface_index
        IF-MIB::ifType: interface_type
        IF-MIB::ifLastChange: last_change
        IF-MIB::ifInErrors: in_errors
        IF-MIB::ifOutErrors: out_errors
        IF-MIB::ifInDiscards: in_discards
        IF-MIB::ifOutDiscards: out_discards
        IF-MIB::ifSpeed: interface_speed
      custom_attributes:
        - name: interface_utilization
          params:
            speed_field: high_speed
            in_octets_field: in_octets
            out_octets_field: out_octets
        - name: interface_status_label
          params:
            admin_status_field: admin_status
            oper_status_field: oper_status
            admin_output_field: admin_status_label
            oper_output_field: oper_status_label
      transformations: ["enrich_device_info"]
      append: ["system_info.sys_name"]
      ##field_exclude: ["in_discards_time_delta","*_rate"]
      output_stream: 
        name: rda_snmp_metrics
        type: pstream

    
  # Data Transformations
  data_transformations:

    # Dataset Enrichment
    - name: "enrich_device_info"
      type: enrich
      dataset: "network_device_chassis_dict"
      source_key_columns: ["target_ip"]
      dict_key_columns: ["target_ip"]
      enrich_columns: ["hostname","product_id","vendor","sw_type"]
      enrich_columns_as: ["device_hostname","device_model","device_vendor","device_sw_type"]
      return_empty_columns: true
      enrich_column_defaults: ["Not Available","Not Available", "Not Available", "Not Avaiable"]

    # Memory Calculation Transformation
    - name: memory_enrichment
      type: starlark
      script: |
        def round(value, decimals):
            factor = 1
            for _ in range(decimals):
                factor *= 10
            return int(value * factor) / factor
        def apply(metric):
            total_units = metric.fields.get("memory_total")
            used_units = metric.fields.get("memory_used")
            free_units = metric.fields.get("memory_free")
            memory_type = metric.tags.get("memory_name")
            units = metric.fields.get("memory_units")

            if memory_type == "System":
                units = 1024

            if units == None or units == 0:
                units = 1

            units = float(units)

            if total_units != None and used_units != None:
                total_bytes = float(total_units) * units
                used_bytes = float(used_units) * units
                free_bytes = total_bytes - used_bytes
                metric.fields["memory_total"] = int(total_bytes)
                metric.fields["memory_used"] = int(used_bytes)
                metric.fields["memory_free"] = int(free_bytes)
                if total_bytes > 0:
                    metric.fields["memory_usage"] = round((used_bytes / total_bytes) * 100.0, 2)
                else:
                    metric.fields["memory_usage"] = 0.0
            elif total_units != None and free_units != None:
                total_bytes = float(total_units) * units
                free_bytes = float(free_units) * units
                used_bytes = total_bytes - free_bytes
                metric.fields["memory_total"] = int(total_bytes)
                metric.fields["memory_used"] = int(used_bytes)
                metric.fields["memory_free"] = int(free_bytes)
                if total_bytes > 0:
                    metric.fields["memory_usage"] = round((used_bytes / total_bytes) * 100.0, 2)
                else:
                    metric.fields["memory_usage"] = 0.0
            elif used_units != None and free_units != None:
                used_bytes = float(used_units) * units
                free_bytes = float(free_units) * units
                total_bytes = used_bytes + free_bytes
                metric.fields["memory_total"] = int(total_bytes)
                metric.fields["memory_used"] = int(used_bytes)
                metric.fields["memory_free"] = int(free_bytes)
                if total_bytes > 0:
                    metric.fields["memory_usage"] = round((used_bytes / total_bytes) * 100.0, 2)
                else:
                    metric.fields["memory_usage"] = 0.0
            return metric

'''    
