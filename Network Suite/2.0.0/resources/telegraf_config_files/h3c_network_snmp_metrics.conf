[[inputs.rda_snmp]]
enabled = true
tags = {asset_type = "network_device", vendor = "H3C", kpi_metric = "yes" }
alias = "h3c"
input_definition= '''
---
version: "1.0"
collector:
  # Metrics Collection Frequency (Global Setting for all Metrics)
  frequency: 300

  # Network Device Filter by Vendor's Sys Object ID
  input_criteria:
    frequency: 600
    pstream: network_access_verification
    query: "auth_state is 'Success' and protocol is 'SNMP' and sys_object_id contains '1.3.6.1.4.1.25506.'"
    # Optional: Specify custom field names from the pstream
    # cred_field: "auth_credential"      # Field containing credential name (defaults to "snmp_cred" or "used_cred")
    ip_address_field: "ip_address"
    cred_field: "used_cred" 

  # SNMP Connection Properties
  connection_properties:
    - name: default
      retries: 2
      timeout: 10


  scalar_fields:

    # Base System Attributes
    - name: system_info
      ##frequency: 60
      fields:
        - name: sys_name
          oid: "SNMPv2-MIB::sysName.0"
        - name: sys_location
          oid: "SNMPv2-MIB::sysLocation.0"
    
    # Uptime Metric
    - name: uptime
      ##frequency: 60
      fields:
        - name: sys_name
          oid: "SNMPv2-MIB::sysName.0"
        - name: sys_location
          oid: "SNMPv2-MIB::sysLocation.0"
        - name: uptime
          oid: "DISMAN-EVENT-MIB::sysUpTimeInstance"
      custom_attributes:
        - name: uptime_conversion
          params:
            source_field: uptime
            output_prefix: uptime_seconds
      transformations: ["enrich_device_info"]
      field_exclude: ["sys_location"]
      output_stream: rda_snmp_metrics

    # CPU Metrics Collection
    - name: cpu
      ##frequency: 60
      fields:
        - name: sys_name
          oid: "SNMPv2-MIB::sysName.0"
        - name: sys_location
          oid: "SNMPv2-MIB::sysLocation.0"
        - name: cpu_total_5sec_rev
          oid: ".1.3.6.1.4.1.25506.2.6.1.1.1.1.6.212"
        - name: cpu_total_1min_rev
          oid: ".1.3.6.1.4.1.25506.2.6.1.1.1.1.33.212"
        - name: cpu_total_5min_rev
          oid: ".1.3.6.1.4.1.25506.2.6.1.1.1.1.34.212"
      custom_attributes:
        - name: cpu_usage
          params:
            source_field: cpu_total_1min_rev
            output_prefix: cpu_usage
      transformations: ["enrich_device_info"]
      field_exclude: ["mib","index"]
      output_stream: rda_snmp_metrics

    # Memory Metric Collection
    - name: memory
      ##frequency: 60
      fields:
        - name: sys_name
          oid: "SNMPv2-MIB::sysName.0"
        - name: sys_location
          oid: "SNMPv2-MIB::sysLocation.0"
        - name: memory_name
          oid: ".1.3.6.1.2.1.47.1.1.1.1.2.212"
        - name: memory_total
          oid: ".1.3.6.1.4.1.25506.2.6.1.1.1.1.10.212"
        - name: memory_usage
          oid: "1.3.6.1.4.1.25506.2.6.1.1.1.1.8.212"
      transformations: ["enrich_device_info","memory_enrichment"]
      field_exclude: ["mib","index"]
      output_stream: rda_snmp_metrics

  table_inventories:

    # Interface Inventory
    - name: interface_inventory
      mib: IF-MIB::ifXTable
      ##frequency: 30
      attributes:
        ifDescr: interface_description
        ifAlias: interface_alias
        ifType: interface_type
        ifAdminStatus: admin_status
        ifOperStatus: oper_status
        ifName: interface_name
        ifIndex: interface_index
      transformations: ["enrich_device_info","interface_type_label_enrichment"]
      append: ["system_info.sys_name"]
      output_stream:
        name: rda_snmp_network_interfaces_inventory

    # Device Entity Physical Inventory
    - name: entity_physical_inventory
      mib: ENTITY-MIB::entPhysicalTable
      frequency: 300
      attributes:
        entPhysicalDescr: "description"
        entPhysicalClass: "class"
        entPhysicalContainedIn: "contained_in"
        entPhysicalIsFRU: "is_fru"
        entPhysicalName: "entity_name"
        entPhysicalParentRelPos: "parent_rel_pos"
        entPhysicalVendorType: "vendor_type"
        entPhysicalHardwareRev: "hardware_rev"
        entPhysicalFirmwareRev: "firmware_rev"
        entPhysicalSoftwareRev: "software_rev"
        entPhysicalSerialNum: "serial_number"
        entPhysicalModelName: "model"
        ##entPhysicalVendorName: "entity_vendor"
        entPhysicalAlias: "alias"
      append: ["system_info.sys_name"]
      output_stream:
        name: rda_snmp_entity_physical_inventory

  metric_collections:

    # Interface Metrics Collection 
    - name: interface
      ##frequency: 60
      mib: IF-MIB::ifTable
      index_field: if_index
      #pstream: rdaf_telegraf_interface
      #filter_query: "admin_status == 1 and oper_status == 1 and vendor 'H3C'"
      attributes:
        IF-MIB::ifHCInOctets: in_octets
        IF-MIB::ifHCOutOctets: out_octets
        IF-MIB::ifDescr: interface_description
        IF-MIB::ifAlias: interface_alias
        IF-MIB::ifHighSpeed: high_speed
        IF-MIB::ifOperStatus: oper_status
        IF-MIB::ifAdminStatus: admin_status
        IF-MIB::ifIndex: interface_index
        IF-MIB::ifType: interface_type
        IF-MIB::ifLastChange: last_change
        IF-MIB::ifInErrors: in_errors
        IF-MIB::ifOutErrors: out_errors
        IF-MIB::ifInDiscards: in_discards
        IF-MIB::ifOutDiscards: out_discards
        IF-MIB::ifSpeed: interface_speed
      custom_attributes:
        - name: interface_utilization
          params:
            speed_field: high_speed
            in_octets_field: in_octets
            out_octets_field: out_octets
        - name: interface_status_label
          params:
            admin_status_field: admin_status
            oper_status_field: oper_status
            admin_output_field: admin_status_label
            oper_output_field: oper_status_label
      transformations: ["enrich_device_info"]
      append: ["system_info.sys_name"]
      field_exclude: ["mib","*_rate","*_time_delta","index","interface_alias"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

    # Interface CRC Errors Metric Collection
    - name: interface_crc_errors
      ##frequency: 30
      mib: 1.3.6.1.2.1.10.7.2.1
      index_field: 1.3.6.1.2.1.10.7.2.1.1
      attributes:
        1.3.6.1.2.1.10.7.2.1.3: crc_errors
        1.3.6.1.2.1.10.7.2.1.2: alignment_errors
        1.3.6.1.2.1.10.7.2.1.13: frame_too_longs
        1.3.6.1.2.1.10.7.2.1.18: symbol_errors
      transformations: ["enrich_device_info","interface_description"]
      append: ["system_info.sys_name"]
      field_exclude: ["mib","*_rate","*_time_delta","index","interface_alias"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

    # Sensors: Temperature Metrics Collection
    - name: environmental_temperature
      ##frequency: 30
      mib: .1.3.6.1.4.1.25506.2.6.1.1.1
      index_field: .1.3.6.1.4.1.25506.2.6.1.1.1.1
      attributes:
        .1.3.6.1.4.1.25506.2.6.1.1.1.1.12: sensor_value
        .1.3.6.1.4.1.25506.2.6.1.1.1.1.19: sensor_status
      tags:
        sensor_type_label: celsius
      transformations: ["enrich_device_info","entity_physical_info","sensor_status_enrichment"]
      append: ["system_info.sys_name"]
      field_exclude: ["mib","index"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

    # Sensors: Power Voltage Metrics Collection
    - name: environmental_voltage
      ##frequency: 30
      mib: .1.3.6.1.4.1.25506.2.6.1.1.1
      index_field: .1.3.6.1.4.1.25506.2.6.1.1.1.1
      attributes:
        .1.3.6.1.4.1.25506.2.6.1.1.1.1.14: sensor_value
        .1.3.6.1.4.1.25506.2.6.1.1.1.1.19: sensor_status
      tags:
        sensor_type_label: volts
      transformations: ["enrich_device_info","entity_physical_info","sensor_status_enrichment"]
      append: ["system_info.sys_name"]
      field_exclude: ["mib","index"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

    # Sensors: Power Status
    - name: environmental_power
      ##frequency: 30
      mib: .1.3.6.1.4.1.25506.2.6.1.1.1
      index_field: .1.3.6.1.4.1.25506.2.6.1.1.1.1
      attributes:
        .1.3.6.1.4.1.25506.8.35.9.1.2.1.2: sensor_status
      tags:
        sensor_type_label: power
      transformations: ["enrich_device_info","entity_physical_info","power_fan_status_enrichment"]
      append: ["system_info.sys_name"]
      field_exclude: ["mib","index"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

    # Sensors: FAN Status
    - name: environmental_fan
      ##frequency: 30
      mib: .1.3.6.1.4.1.25506.2.6.1.1.1
      index_field: .1.3.6.1.4.1.25506.2.6.1.1.1.1
      attributes:
        .1.3.6.1.4.1.25506.8.35.9.1.1.1.2: sensor_status
      tags:
        sensor_type_label: fan
      transformations: ["enrich_device_info","entity_physical_info","power_fan_status_enrichment"]
      append: ["system_info.sys_name"]
      field_exclude: ["mib","index"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

    # POE Port Power Usage Metrics
    - name: poe_port
      mib: .1.3.6.1.2.1.105.1.1.1
      attributes:
        .1.3.6.1.2.1.105.1.1.1.3: poe_port_admin_status
        .1.3.6.1.2.1.105.1.1.1.6: poe_port_status
        .1.3.6.1.4.1.25506.2.14.1.1.6: poe_max_power
        .1.3.6.1.4.1.25506.2.14.1.1.5: poe_power_consumption
      transformations:
        - enrich_device_info
        - poe_port_index_enrichment
        - poe_port_enrichment
        - interface_description
      append: ["system_info.sys_name"]
      field_exclude: ["mib","index","*_rate","*_time_delta"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

    # POE Device Power Usage Metrics
    - name: poe_chassis
      mib: .1.3.6.1.2.1.105.1.3.1
      index_field: .1.3.6.1.2.1.105.1.3.1.1
      attributes:
        .1.3.6.1.2.1.105.1.3.1.1.3: poe_status
        .1.3.6.1.2.1.105.1.3.1.1.2: poe_total_power
        .1.3.6.1.2.1.105.1.3.1.1.4: poe_used_power
      transformations:
        - enrich_device_info
        - poe_chassis_enrichment
      append: ["system_info.sys_name"]
      field_exclude: ["mib","index","*_rate","*_time_delta"]
      output_stream:
        name: rda_snmp_metrics
        type: pstream

  # Data Transformations
  data_transformations:

    # Dataset Enrichment
    - name: "enrich_device_info"
      type: enrich
      dataset: "network_device_chassis_dict"
      source_key_columns: ["target_ip"]
      dict_key_columns: ["target_ip"]
      enrich_columns: ["hostname","product_id","vendor"]
      enrich_columns_as: ["device_hostname","device_model","device_vendor"]
      return_empty_columns: "yes"
      enrich_column_defaults: ["Not Available","Not Available", "Not Available"]

    # Dataset Enrichment
    - name: "entity_physical_info"
      type: enrich
      dataset: "rda_snmp_entity_physical_inventory"
      source_key_columns: ["target_ip","index"]
      dict_key_columns: ["target_ip","index"]
      enrich_columns: ["description"]
      enrich_columns_as: ["sensor_name"]
      return_empty_columns: true
      enrich_column_defaults: ["Not Available"]

    # Dataset Enrichment
    - name: "interface_description"
      type: enrich
      dataset: "interface_ethernet_inventory"
      source_key_columns: ["target_ip","poe_port_index|index"]
      dict_key_columns: ["target_ip","index"]
      enrich_columns: ["interface_description"]
      enrich_columns_as: ["interface_description"]
      return_empty_columns: true
      enrich_column_defaults: ["Not Available"]

    # Memory Calculation Transformation
    - name: memory_enrichment
      type: starlark
      script: |
        def round(value, decimals):
            factor = 1
            for _ in range(decimals):
                factor *= 10
            return int(value * factor) / factor
        def apply(metric):
            total = metric.fields.get("memory_total")
            usage = metric.fields.get("memory_usage")
            # Must have both fields
            if total == None or usage == None:
                return metric
            # Convert types (NO try/except in starlark)
            total_bytes = float(total)
            usage_pct = float(usage)
            # Sanity guards
            if total_bytes <= 0:
                return metric
            if usage_pct < 0 or usage_pct > 100:
                return metric
            # Calculate used & free
            used_bytes = (usage_pct / 100.0) * total_bytes
            free_bytes = total_bytes - used_bytes
            # Clamp
            if used_bytes < 0:
                used_bytes = 0
            if free_bytes < 0:
                free_bytes = 0
            # Write fields
            metric.fields["memory_total"] = int(total_bytes)
            metric.fields["memory_used"]  = int(used_bytes)
            metric.fields["memory_free"]  = int(free_bytes)
            metric.fields["memory_usage"] = round(usage_pct, 2)
            return metric

    # Power Status Enrichment
    - name: power_fan_status_enrichment
      type: starlark
      script: |

        # Mapping dictionary
        status_map = {
            1: "active",
            2: "deactive",
            3: "not installed",
            4: "unsupported"
        }

        def apply(metric):

            # Get numeric value
            status = metric.fields.get("sensor_status")

            if status != None:

                # Convert to int (important if coming as float)
                status_int = int(status)

                # Lookup label
                label = status_map.get(status_int, "unknown")

                # Add new field
                metric.fields["sensor_status_label"] = label

            return metric

    # Environmental Temperature Enrichment
    - name: sensor_status_enrichment
      type: starlark
      script: |


        # Mapping dictionary
        status_map = {
            1: "notSupported",
            2: "normal",
            3: "postFailure",
            4: "entityAbsent",
            5: "nearThresholdError",
            11: "poeError",
            21: "stackError",
            22: "stackPortBlocked",
            23: "stackPortFailed",
            31: "sfpRecvError",
            32: "sfpSendError",
            33: "sfpBothError",
            34: "sfpRecvExceedUpperLimit",
            35: "sfpRecvBelowLowerLimit",
            36: "sfpSendExceedUpperLimit",
            37: "sfpSendBelowLowerLimit",
            41: "fanError",
            51: "psuError",
            61: "rpsError",
            71: "moduleFaulty",
            81: "sensorError",
            91: "hardwareFaulty"
        }

        def apply(metric):
        
            # Get numeric value
            status = metric.fields.get("sensor_status")

            if status != None:

                # Convert to int (important if coming as float)
                status_int = int(status)

                # Lookup label
                label = status_map.get(status_int, "unknown")

                # Add new field
                metric.fields["sensor_status_label"] = label

            return metric


    # POE Port Index Enrichment
    - name: poe_port_index_enrichment
      type: starlark
      script: |

        def apply(metric):
            idx = metric.tags.get("index")
            if idx:
                metric.tags["poe_port_index"] = idx.split(".")[-1]
            return metric

    # POE Port Power Metrics Enrichment
    - name: poe_port_enrichment
      type: starlark
      script: |

        def round(value, decimals):
            factor = 1
            for _ in range(decimals):
                factor *= 10
            return int(value * factor) / factor

        def apply(metric):

            # -----------------------------------
            # Convert Power Values (mW → W)
            # -----------------------------------
            power_fields = [
                "poe_max_power",
                "poe_power_consumption"
            ]

            for field in power_fields:
                value = metric.fields.get(field)

                if value != None:
                    if type(value) == "string":
                        value = float(value)

                    # Convert milliwatts → watts
                    metric.fields[field] = float(value) / 1000.0

            # -----------------------------------
            # Calculate Usage %
            # -----------------------------------
            max_power = metric.fields.get("poe_max_power")
            used_power = metric.fields.get("poe_power_consumption")
            available_power = max_power - used_power

            if max_power != None and used_power != None:
                if max_power > 0.0:
                    usage = (used_power / max_power) * 100.0

                    # manual round to 2 decimals
                    factor = 100.0
                    usage = int(usage * factor) / factor

                    metric.fields["poe_usage_percent"] = usage
                metric.fields["poe_available_power"] = round(available_power, 2)
                metric.fields["poe_max_power"] = round(max_power, 2)
                metric.fields["poe_power_consumption"] = round(used_power, 2)

            return metric

    # POE Chassis Power Metrics Enrichment
    - name: poe_chassis_enrichment
      type: starlark
      script: |

        def apply(metric):

            # -----------------------------------
            # Calculate Usage %
            # -----------------------------------
            total_power = metric.fields.get("poe_total_power")
            used_power = metric.fields.get("poe_used_power")
            available_power = total_power - used_power

            if total_power != None and used_power != None:
                if total_power > 0.0:
                    usage = (used_power / total_power) * 100.0

                    # manual round to 2 decimals
                    factor = 100.0
                    usage = int(usage * factor) / factor

                    metric.fields["poe_usage_percent"] = usage
                metric.fields["poe_available_power"] = available_power

            return metric
'''

