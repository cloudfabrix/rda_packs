[[inputs.rda_syslog]]
enabled = true
tags = { input = "syslog_udp" }

input_definition = '''
collector:
  syslog_properties:
    bind_host: "0.0.0.0"
    port: 5141
    protocol: "udp"
    worker_count: 8
    queue_size: 200
    flush_interval: 10
    batch_size: 8000
    timeout: 60
  field_exclude: [ "Timestamp", "Appname", "Message", "MsgID", "ProcID", "Hostname" ]
  output_stream:
    name: "syslog_udp_events_stream"
    type: "pstream"

  data_transformations:
    - name: syslog_grok
      type: grok
      parse_fields: ["raw"]
      drop_original: false
      merge: "override"
      grok_patterns:
        - '<.*>%{NUMBER}:\s%{SYSLOGTIMESTAMP:syslog_timestamp}\sUTC:\s%%{DATA:syslog_code}:\sInterface\s(?<interface_name>[A-Za-z\-]+[0-9\/\.]*),\sSFP\s(?:(?<direction1>Tx|Rx)\sPower\s(?<level1>Low|High)|Power\s(?<level2>Low|High)\s(?<direction2>Tx|Rx))\sAlarm'
        - '<.*>%{NUMBER}:\s%{SYSLOGTIMESTAMP:syslog_timestamp}\sUTC:\s%%{DATA:syslog_code}:\sMemory allocation(?: of %{INT} bytes)? failed(?: due to ECC error)?(?: at| from)?\s%{DATA:memory_address}(?:,\spool\s%{WORD:pool})?.*|<.*>%{NUMBER}:\s%{SYSLOGTIMESTAMP:syslog_timestamp}\sUTC:\s%%{DATA:syslog_code}:\sFailed to allocate memory for FIB entry%{GREEDYDATA}'
        - '.*%%{DATA:syslog_code}:.*Interface %{DATA:interface_name},.changed\sstate\sto\s%{GREEDYDATA:state}'
        - '.*%%{DATA:syslog_code}:.*Interface %{DATA:interface_name},.*'
        - '<.*>%{NUMBER}:\s\*?%{SYSLOGTIMESTAMP:syslog_timestamp}\s?(?:UTC)?:\s%%{DATA:syslog_code}:.*Nbr\s%{IP}\son\s%{NOTSPACE:interface_name}\sfrom\s%{WORD}\sto\s%{WORD},.*'
        - '<.*>%{NUMBER}:\s\*?%{SYSLOGTIMESTAMP:syslog_timestamp}\s?(?:UTC)?:\s%%{DATA:syslog_code}:.*Nbr\s%{IP}\son\s%{NOTSPACE:interface_name}\s%{GREEDYDATA:reason}'
        - '<.*>%{NUMBER}:\s\*?%{SYSLOGTIMESTAMP:syslog_timestamp}\s?(?:UTC)?:\s%%{DATA:syslog_code}:.*Number\sof\sprefixes\sreceived\sfrom\s%{IP:neighbor_ip}.*'
        - '<.*>%{NUMBER}:\s%{SYSLOGTIMESTAMP:syslog_timestamp}\sUTC:\s%{DATA:syslog_code}:\sneighbor\s%{IP:neighbor_ip}\s%{WORD:state}(?:\sInterface\s(?<interface>[A-Za-z]+[0-9\/\.]+))?(?:\s\((?<details>[^)]*)\))?'
        - '<.*>%{NUMBER}:\s%{SYSLOGTIMESTAMP:syslog_timestamp}\sUTC:\s%%{DATA:syslog_code}:\sAdjacency\sto\s%{DATA:neighbor_name}\s\((?<interface_name>[A-Za-z\-]+[0-9\/\.]*)\)\schanged\sstate\s(?:to\s%{WORD:new_state}|from\s%{WORD:old_state}\sto\s%{WORD:new_state})'
        - '<.*>%{NUMBER}:\s\*?%{SYSLOGTIMESTAMP:syslog_timestamp}\s?(?:UTC)?:\s%%{DATA:syslog_code}:\sneighbor\s%{IP:neighbor_ip}\s%{GREEDYDATA:reason}'
        - '<.*>%{NUMBER}:\s%{SYSLOGTIMESTAMP:syslog_timestamp}\sUTC:\s%%{DATA:syslog_code}:\sNo\.\sof\sprefixes\sreceived\sfrom\s%{IP:neighbor_ip}\s%{GREEDYDATA:reason}'
        - '<.*>%{NUMBER}:\s%{SYSLOGTIMESTAMP:syslog_timestamp}\sUTC:\s%%{DATA:syslog_code}:\s(?:Serial\s)?Interface\s%{NOTSPACE:interface_name}(?:\sis\s%{WORD:state})?(?:,\s%{GREEDYDATA:alarm_message}|\s%{GREEDYDATA:status_message})'
        - '<.*>%{NUMBER}:\s%{SYSLOGTIMESTAMP:syslog_timestamp}\sUTC:\s%%{DATA:syslog_code}:\sFRU link on port %{NOTSPACE:interface_name}\s%{WORD:state}'
        - '<.*>%{NUMBER}:\s%{SYSLOGTIMESTAMP:syslog_timestamp}\sUTC:\s%%{DATA:syslog_code}:\sBlower\s%{INT:blower_id}\s%{GREEDYDATA:status}|<.*>%{NUMBER}:\s%{SYSLOGTIMESTAMP:syslog_timestamp}\sUTC:\s%%{DATA:syslog_code}:\sFan(?:\s%{INT:fan_id})?(?:\sin\s(?:fan\s)?tray\s%{INT:tray_id})?\s%{GREEDYDATA:status}'
        - '<.*>%{NUMBER}:\s%{SYSLOGTIMESTAMP:syslog_timestamp}\sUTC:\s%%{DATA:syslog_code}:\sPower\s[sS]upply\s%{INT:ps_id}(?:\sin\sslot\s%{DATA:slot})?\s%{GREEDYDATA:status}'
        - '<.*>%{NUMBER}:\s%{SYSLOGTIMESTAMP:syslog_timestamp}\sUTC:\s%%{DATA:syslog_code}:\s(?:PFM Alert:\sStatus:\s%{WORD:severity},\sComponent:\s%{DATA:component},\sDevice:\s%{DATA:device},\sFault:\s%{DATA:fault}|Module\s%{INT:module_id}\sfailed:\s%{GREEDYDATA:reason})'
        - '<.*>%{NUMBER}:\s%{SYSLOGTIMESTAMP:syslog_timestamp}\sUTC:\s%%{DATA:syslog_code}:\s(?:Chassis\stemperature\sis\sat\sor\sabove\s%{WORD:severity}\slevel|Module\s%{INT:module_id}\stemperature\sis\sat\sor\sabove\s%{WORD:severity}\slevel(?:\.\s.*)?|Processors\s%{INT:cpu_id}\stemperature\sis\s%{INT:current_temp}\sCelsius,\swhich\sexceeds\sthreshold\s%{INT:threshold_temp}\sCelsius)'
        - '<.*>%{NUMBER}:\s%{SYSLOGTIMESTAMP:syslog_timestamp}\sUTC:\s%%{DATA:syslog_code}:\sCard\s%{INT:card_id}\sbeing\sreset\s\(%{GREEDYDATA:reason}\)'
        - '<.*>%{NUMBER}:\s%{SYSLOGTIMESTAMP:syslog_timestamp}\sUTC:\s%%{DATA:syslog_code}:\sNode\s%{DATA:node}\sstate\schanged\sto\s%{GREEDYDATA:state}'
        - '<.*>%{NUMBER}:\s%{SYSLOGTIMESTAMP:syslog_timestamp}\sUTC:\s%%{DATA:syslog_code}:\sduplex mismatch discovered on %{NOTSPACE:local_interface}.*with %{DATA:neighbor_device} %{NOTSPACE:neighbor_interface}.*'
        - '<.*>%{NUMBER}:\s%{SYSLOGTIMESTAMP:syslog_timestamp}\sUTC:\s%%{DATA:syslog_code}:\s.*Interface\s%{DATA:interface_name}(,|:)%{GREEDYDATA}'
        - '<.*>%{NUMBER}:\s%{SYSLOGTIMESTAMP:syslog_timestamp}\sUTC:\s%%{DATA:syslog_code}:\s%{GREEDYDATA}'
        - '<.*>%{NUMBER}.*:\s%{SYSLOGTIMESTAMP:syslog_timestamp}\sUTC:\s%%{DATA:syslog_code}:\s%{GREEDYDATA}'
        - '<.*>%{NUMBER}:\s%{SYSLOGTIMESTAMP:syslog_timestamp}:\s%%{DATA:syslog_code}:\s%{GREEDYDATA}'
        - '<.*>:\s%{NUMBER}\s%{SYSLOGTIMESTAMP:syslog_timestamp}\sUTC:\s%%{DATA:syslog_code}:\s%{GREEDYDATA}'
        - '<.*>%%{DATA:syslog_code}:\s+%{DATA:interface_name}:%{GREEDYDATA}|<.*>%{NUMBER}:.*%%{DATA:syslog_code}:\s%{GREEDYDATA}'
        - '<.*>:\s%{NUMBER}\s%{SYSLOGTIMESTAMP:syslog_timestamp}\sUTC:\s.*%%{DATA:syslog_code}:\s%{GREEDYDATA}'
        - '<.*>%%{DATA:syslog_code}:\s+%{DATA:interface_name},%{GREEDYDATA}'
        - '.*%%{DATA:syslog_code} :.*Interface\s%{DATA:interface_name}\s%{GREEDYDATA}|.*%%{DATA:syslog_code}:\sInterface\s%{DATA:interface_name}\s%{GREEDYDATA}'
        - '<.*>%%{DATA:syslog_code}:\s\b(?<interface_name>[GgEeFfTt].*)|<.*>%%{DATA:syslog_code}:.*'
        - '.*%%{DATA:syslog_code}:\s%{GREEDYDATA:message}'
        - '.*%%{GREEDYDATA:syslog_code}\s:.*'
        - '<.*>%{NUMBER}\s%{TIMESTAMP_ISO8601:syslog_timestamp}\s%{DATA:syslog_hostname}\s%{DATA:process_name}\s%{GREEDYDATA}'
        - '<.*>%{SYSLOGTIMESTAMP:syslog_timestamp}\s%{DATA:syslog_hostname}\s%{DATA:process_name}\s%{GREEDYDATA}'
        - '<.*>%{NUMBER}\s%{TIMESTAMP_ISO8601:syslog_timestamp}\s%{DATA:syslog_hostname}\s%{DATA:process_name}\s%{NUMBER:process_id}\s%{GREEDYDATA}'
        - '<.*>%{NUMBER}\s%{TIMESTAMP_ISO8601:syslog_timestamp}\s%{DATA:syslog_hostname}\s%{DATA:process_name}.*pid:\s%{NUMBER:process_id}'
    - name: network_inventory_enrich
      type: enrich
      dataset: "network_device_chassis_dict"
      dict_key_columns: ["target_ip"]
      source_key_columns: ["rda_gw_client_ip"]
      enrich_columns: ["device_status", "hostname", "vendor", "product_id"]
      enrich_columns_as: ["device_status", "device_hostname", "device_vendor", "device_model"]
      return_empty_columns: true
      enrich_column_defaults: ["UNMANAGED", "Not Available", "Not Available", "Not Available"]
'''
