    attributes:
      os_external: false
      timestamp: rda_gw_timestamp
      ism:
        rollover:
          min_index_age: 3d
          min_size: 60gb
        delete:
          min_index_age: 7d
        index_settings:
          index.refresh_interval: 60s
          index.number_of_shards: '3'
          index.number_of_replicas: '1'
        index_mappings:
          properties:
            rda_gw_timestamp:
              type: date
            Timestamp:
              type: date
            syslog_facility_num:
              type: long
            syslog_priority:
              type: long
            syslog_severity_num:
              type: long
            rda_gw_seq:
              type: long
    remove_on_deactivation: true
    source: OpenSearch
  - name: syslog_tcp_json_events_stream
