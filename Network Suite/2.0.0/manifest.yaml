name: Network Suite
version: 2.0.0
folder: /collection/network/aia_pages_grouping_app
published_date: 2026-05-19
publisher: Fabrix.ai
label: Network Suite
scope: system
description:
  value: ""
  md: "./description.md"

type: collection


requires:
   - name: Fabrix Inventory Collection Base Pack
     version: ">=7.2.1"
     auto_install_requires: true
   - name: Fabrix AIOps Fault Management Base 
     version: ">=9.0.14"
     auto_install_requires: true

fabric_services:
 - name: worker
   version: ">=8.2.1"
 - name: api-server
   version: ">=8.2.1"

artifacts:
  credentials:
    - name: cfxaia
      type: cfxaia
      remove_on_deactivation: true
    - name: asset-discovery
      type: asset-discovery
      remove_on_deactivation: true
    - name: graph
      type: graphdb
      remove_on_deactivation: true
    - name: diagnostictools
      type: diagnostictools
      remove_on_deactivation: true


  datasets:
  - name: all_models
    data_file: ./data/all_models.csv
    folder: NetworkDevicePack
    remove_on_deactivation: true
  - name: ifTypeLabel_dict
    data_file: ./data/ifTypeLabel_dict.csv
    folder: NetworkDevicePack
    remove_on_deactivation: true

  data_mapping_models:
  - name: cdp_model
    file: ./artifacts/data_mapping_models/cdp_model.json
    remove_on_deactivation: true
    creation_policy: overwrite
  - name: interface_model
    file: ./artifacts/data_mapping_models/interface_model.json
    remove_on_deactivation: true
    creation_policy: overwrite
  - name: network_assets_model
    file: ./artifacts/data_mapping_models/network_assets_model.json
    remove_on_deactivation: true
    creation_policy: overwrite
    
