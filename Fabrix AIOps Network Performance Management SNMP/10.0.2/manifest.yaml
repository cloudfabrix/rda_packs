            bgp_peer_out_updates_time_delta:
              type: double
            bgp_peer_local_port:
              type: long
            bgp_peer_remote_port:
              type: long
            bgp_peer_remote_as:
              type: long
            bgp_peer_state:
              type: long
            bgp_peer_uptime:
              type: long
            result_code:
              type: long
    remove_on_deactivation: true
    source: OpenSearch
  - name: rda_snmp_network_interfaces_inventory
    attributes:
      unique_keys:
      - target_ip
      - interface_index
      retention_days: 15
    autocreate: true
    remove_on_deactivation: true
  - name: rda_snmp_entity_physical_inventory
    attributes:
      unique_keys:
      - target_ip
      - index
      retention_days: 30
    autocreate: true
    remove_on_deactivation: true

  dashboards:
    - name: kpi-workbench
      file: ./artifacts/dashboards/kpi-workbench.json
      creation_policy: overwrite
    - name: preview_kpi_dashboard
      file: ./artifacts/dashboards/preview_kpi_dashboard.json
      creation_policy: overwrite
    - name: snmp_metrics_navigator
      file: ./artifacts/dashboards/snmp_metrics_navigator.json
