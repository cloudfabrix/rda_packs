name: Fabrix AIOps Network Performance Management SNMP
version: 10.0.2
folder: /collection/network/fabrix_aiops_network_performance_management_snmp
published_date: 2026-06-19
publisher: Fabrix.ai
label: Fabrix AIOps Network Performance Management SNMP
scope: system
description:
  value: ""
  md: ./description.md
type: collection
requires:
  - name: Network Device Discovery
    version: ">=9.0.1"
    auto_install_requires: true
  
fabric_services:
 - name: worker
   version: ">=8.2.0"
 - name: api-server
   version: ">=8.2.0"
 


artifacts:
  pstreams:
  - name: rda_snmp_metrics
    description: ''
    attributes:
      os_external: false
      ism:
        rollover:
          min_index_age: 3d
          min_size: 60gb
        delete:
          min_index_age: 15d
        index_settings:
          index.mapping.total_fields.limit: '1500'
          index.refresh_interval: 60s
          index.number_of_shards: '3'
          index.number_of_replicas: '1'
        index_mappings:
          dynamic: strict
          properties:
            cpu_total_5sec_rev:
              type: long
            cpu_total_1min_rev:
              type: long
            cpu_total_5min_rev:
              type: long
            cpu_usage:
              type: double
            memory_free:
              type: long
            memory_used:
              type: long
            memory_total:
              type: long
            memory_usage:
              type: double
            memory_units:
              type: long
            in_octets:
              type: long
            out_octets:
              type: long
            in_octets_delta:
              type: long
            in_octets_rate:
              type: double
            in_octets_time_delta:
              type: double
            out_octets_delta:
              type: long
            out_octets_rate:
              type: double
            out_octets_time_delta:
              type: double
            in_errors:
              type: long
            in_errors_delta:
              type: long
            in_errors_rate:
              type: double
            in_errors_time_delta:
              type: double
            out_errors:
              type: long
            out_errors_delta:
              type: long
            out_errors_rate:
              type: double
            out_errors_time_delta:
              type: double
            in_discards:
              type: long
            in_discards_delta:
              type: long
            in_discards_rate:
              type: double
            in_discards_time_delta:
              type: double
            out_discards:
              type: long
            out_discards_delta:
              type: long
            out_discards_rate:
              type: double
            out_discards_time_delta:
              type: double
            high_speed:
              type: long
            interface_speed:
              type: long
            index:
              type: double
            interface_index:
              type: long
            interface_type:
              type: long
            input_utilization:
              type: double
            output_utilization:
              type: double
            interface_utilization:
              type: double
            oper_status:
              type: long
            admin_status:
              type: long
            last_change:
              type: long
            crc_errors:
              type: long
            crc_errors_delta:
              type: long
            crc_errors_rate:
              type: double
            crc_errors_time_delta:
              type: double
            alignment_errors:
              type: long
            alignment_errors_delta:
              type: long
            alignment_errors_rate:
              type: double
            alignment_errors_time_delta:
              type: double
            frame_too_longs:
              type: long
            frame_too_longs_delta:
              type: long
            frame_too_longs_rate:
              type: double
            frame_too_longs_time_delta:
              type: double
            symbol_errors:
              type: long
            symbol_errors_delta:
              type: long
            symbol_errors_rate:
              type: double
            symbol_errors_time_delta:
              type: double
            ntp_status:
              type: long
            ntp_time_precision_ms:
              type: double
            ntp_time_precision:
              type: long
            sensor_value:
              type: long
            sensor_threshold:
              type: long
            sensor_last_shutdown:
              type: long
            sensor_status:
              type: long
            sensor_type:
              type: long
            ospf_neighbor_events:
              type: long
            ospf_neighbor_events_delta:
              type: long
            ospf_neighbor_events_rate:
              type: double
            ospf_neighbor_events_time_delta:
              type: double
            ospf_interface_events:
              type: long
