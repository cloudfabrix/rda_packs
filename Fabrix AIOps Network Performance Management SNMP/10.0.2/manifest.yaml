              type: long
            ospf_interface_events_rate:
              type: double
            ospf_interface_events_time_delta:
              type: double
            ospf_neighbor_state:
              type: long
            ospf_admin_status:
              type: long
            ospf_interface_state:
              type: long
            bgp_peer_admin_status:
              type: long
            bgp_peer_in_messages:
              type: long
            bgp_peer_in_messages_delta:
              type: long
            bgp_peer_in_messages_rate:
              type: double
            bgp_peer_in_messages_time_delta:
              type: double
            bgp_peer_out_messages:
              type: long
            bgp_peer_out_messages_delta:
              type: long
            bgp_peer_out_messages_rate:
              type: double
            bgp_peer_out_messages_time_delta:
              type: double
            bgp_peer_in_updates:
              type: long
