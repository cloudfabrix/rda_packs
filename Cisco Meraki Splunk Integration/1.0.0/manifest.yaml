name: Cisco Meraki Splunk Integration
label: Cisco Meraki Splunk Integration
scope: system
version: 1.0.0
folder: /collection/cisco_meraki_splunk_integration_pack
published_date: 2026-06-18
publisher: Fabrix.ai
description: 
   md: "./description.md"
type: collection

requires:
  - name: Fabrix Inventory Collection Base Pack
    version: ">=7.0.2"
  - name: Workflow Base
    version: ">=1.0.0"
  - name: Cisco Meraki
    version: ">=10.0.2"
  
fabric_services:
 - name: worker
