      creation_policy: overwrite

    - name: meraki_workflow_page
      file: ./artifacts/dashboards/meraki_workflow_page.json
      folder: MerakiIntegrationPack
      creation_policy: overwrite

    - name: continuous_integration
      file: ./artifacts/dashboards/continuous_integration.json
      folder: MerakiIntegrationPack
      creation_policy: overwrite


  pstreams:

    - name: meraki_appbindings_stats_to_stream
      autocreate: true


 
