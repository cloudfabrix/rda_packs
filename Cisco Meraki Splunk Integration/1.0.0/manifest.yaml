 - name: api-server
   version: ">=8.2.1"

artifacts:
  
  dashboards:

    - name: meraki_integration_main_app
      file: ./artifacts/dashboards/meraki_integration_main_app.json
      folder: MerakiIntegrationPack
      creation_policy: overwrite

    - name: meraki_integration_management
      file: ./artifacts/dashboards/meraki_integration_management.json
