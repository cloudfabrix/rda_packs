name: MIB Group Discovery and Collection
label: MIB Group Discovery and Collection
version: 1.0.0
type: collection
published_date: '2026-06-19'
publisher: Fabrix.ai
scope: system
description:
  md: ./description.md

fabric_services:
 - name: worker
   version: ">=8.2.0.1"
 - name: api-server
   version: ">=8.2.0.1"

