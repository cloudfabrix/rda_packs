    ##  template_file: ./artifacts/textfsms/cisco_xr_show_running_config.textfsm
    ##  remove_on_deactivation: true
    - name: cisco_show_running_config_unified
      version: 2026.04.16
      folder: Cisco_Unified
      description: Single show running-config template for IOS, IOS XR, NX-OS, and similar CLI output
      template_file: ./artifacts/textfsms/cisco_show_running_config_unified.textfsm
      remove_on_deactivation: true


  pipelines:
  - name: syslog-backup-standalone-ip
    file: artifacts/PublishedPipeline/syslog-backup-standalone-ip.txt
    version: 2026.02.16.1
    folder: ConfigBackupPack
    skip_validation: false
    creation_policy: overwrite
  - name: syslog-golden-config-pipeline
