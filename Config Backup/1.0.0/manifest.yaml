fabric_services:
 - name: worker
   version: ">=8.1.0.3"
 - name: api-server
   version: ">=8.1.0.3"

artifacts:
  dashboards:
  - name: view-config
    file: artifacts/Dashboard/view-config.json
    folder: ConfigBackupPack
    tags: []
    creation_policy: overwrite
  - name: Config_dashboard
    file: artifacts/Dashboard/Config_dashboard.json
    folder: ConfigBackupPack
    tags: []
    creation_policy: overwrite
  - name: syslog-config
    file: artifacts/Dashboard/syslog-config.json
    folder: ConfigBackupPack
    tags: []
    creation_policy: overwrite
  - name: config_diff_check_widget_v2
    file: artifacts/Dashboard/config_diff_check_widget_v2.json
    folder: ConfigBackupPack
    tags: []
    creation_policy: overwrite
  - name: config-backup-jobs
    file: artifacts/Dashboard/config-backup-jobs.json
    folder: ConfigBackupPack
    tags: []
    creation_policy: overwrite
  - name: config_backup_status
    file: artifacts/Dashboard/config_backup_status.json
    folder: ConfigBackupPack
    tags: []
    creation_policy: overwrite
  ##- name: config_backup_summary
  ##  file: artifacts/Dashboard/config_backup_summary.json
  ##  folder: ConfigBackupPack
  ##  tags: []
  
  

  pstreams:
  - name: syslog-config-backup-stream
    attributes:
      unique_keys: ["config_id"]
      _mappings: {
          "properties": {
            "backup_time": {
              "type": "date"
            },
            "config_change_time": {
              "type": "date"
            },
            "config_size": {
              "type": "long"
            },
            "device_fw_type": {
              "type": "text",
              "fields": {
                "keyword": {
                  "type": "keyword"
                }
              }
            },
            "device_user": {
              "type": "text",
              "fields": {
                "keyword": {
                  "type": "keyword"
                }
              }
            }
          }
        }
    source: OpenSearch
    ##creation_policy: overwrite


  textfsms:
    ##- name: cisco_show_running_config
    ##  version: 2026.03.04
    ##  folder: Cisco_IOS
    ##  description: Template for showing configuration for cisco devices
