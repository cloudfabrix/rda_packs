description: Tools to query conversation-level data from agentic_session_evaluations
  stream.
domain: agentic_sessions
tools:
- data_format: csv
  description: Retrieve schema/fields available in agentic_session_evaluations stream.
  name: get_conversation_evaluation_metadata
  save_to_cache: false
  stream: agentic_session_evaluations
  type: streamMetadata
- data_format: csv
  description: Fetch agentic session records filtered by conversation_id.
  name: get_conversation_evaluation_details
  no_data_message: No records found for the given conversation_id
  parameters:
  - description: List of conversation_ids as a Python list string, e.g. ["id1","id2"]
    name: conversation_ids
    queryMapping: conversation_id in {{conversation_ids}}
    required: false
    type: string
  response_prefix: Here are agentic session records for the requested conversation(s)
  save_to_cache: auto
  stream: agentic_session_evaluations
  type: streamQuery
- custom_config:
    pipeline_content: "--> @dm:empty\n--> @dm:addrow json_data is `[{{json_dumps(comparison_report)}}]`\n\
      --> @dm:explode-json column is \"json_data\"\n--> @dm:eval \n    report_html\
      \ = \"report_html\"\n--> @rn:write-stream name = \"evaluation_comparisons_stream\"\
      \n"
    template_type: jinja
  description: This tool saves the generated evaluation comparison report HTML to
    the evaluation_comparisons_stream.
  name: save_evaluation_comparison_report
  parameters:
  - description: 'A single-line JSON string consisting of a dict containing the merged
      evaluation comparison report. Must include: report_html (string). Example: {"report_html":"<div>...</div>"}'
    name: comparison_report
    required: true
    type: string
  type: runPipeline