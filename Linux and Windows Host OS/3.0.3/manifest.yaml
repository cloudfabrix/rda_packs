            host_os_fs_used_perc:
              type: "double"
            host_os_fs_size_gb:
              type: "double"
            host_os_fs_used_gb:
              type: "double"
            host_os_fs_available_gb:
              type: "double"
            collection_timestamp:
              type: "date"
            

    - name: network-endpoints-identity-stream 
      attributes:
        unique_keys: ["unique_id"]
        timestamp: "collection_timestamp"
        retention_days: 3
        search_case_insensitive: true
        _settings:
          number_of_shards: 3
          number_of_replicas: 1
          refresh_interval: "30s"
        _mappings:
          properties:
            collection_timestamp:
              type: "date"

    
    - name: host_os_access_verification_status
      attributes:
        unique_keys: ["asset_id"]

    - name: linux_windows_on_boarded_hosts
      attributes:
        retention_days: 365
        unique_keys: ["ip_address"] 
        search_case_insensitive: true
        _settings: {
          "number_of_shards": 3,
          "number_of_replicas": 1,
          "refresh_interval": "30s"}

   
  
