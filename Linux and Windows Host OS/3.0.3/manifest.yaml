name: Linux and Windows Host OS
label: Host OS Inventory Collection for Linux and Windows
scope: system
# Pack version needs to be conforming to <major>.<minor>.<micro> etc versioning.
# More detailed spec for versioning: https://packaging.python.org/en/latest/specifications/version-specifiers/
version: 3.0.3
folder: /collection/host_os_inventory_collection
published_date: 2026-06-16
publisher: Fabrix.ai
# Description of the package. Supports HTML/markdown/plain text
# Either can provide description as an inline string in this file
# or have description.html and description.md and give corresponding file paths instead.
# If description is provided by multiple ways, the order of precedence is description.md > description.html > description.value
description: 
  #value: "Host OS inventory collection for single tenant deployments."
  md: "./description.md"

# Type could be collection/feature
type: collection



# Other packs that this solution requires to be deployed
requires:
  - name: Fabrix Inventory Collection Base Pack
    version: ">=7.2.1"


artifacts:
  
  pstreams:
   
    - name: host-os-system-inventory
      attributes:
        retention_days: 5
        unique_keys: ["unique_id"]
        search_case_insensitive: true
        _settings:
          number_of_shards: 3
          number_of_replicas: 1
          refresh_interval: "30s"
        timestamp: "collection_timestamp"
        retention_purge_extra_filter: "asset_status = 'Purge'"
        _mappings:
          properties:
            asset_object:
              type: "keyword"
            asset_status:
              type: "keyword"
            collection_status:
              type: "keyword"
            hostname:
              type: "keyword"
            host_os_ip:
              type: "keyword"
            host_bios_uuid:
              type: "keyword"
            unique_id:
              type: "keyword"
            host_os_vendor:
              type: "keyword"
            host_os_version:
              type: "keyword"
            host_os_kernel:
              type: "keyword"
            host_machine_type:
              type: "keyword"
            host_machine_vendor:
              type: "keyword"
            host_machine_model:
              type: "keyword"
            host_machine_serial:
              type: "keyword"
            host_cpu_vendor:
              type: "keyword"
            host_cpu_model:
              type: "keyword"
            vm_name:
              type: "keyword"
            esxi_host:
              type: "keyword"
            esxi_cluster:
              type: "keyword"
            vcenter_name:
              type: "keyword"
            vcenter_address:
              type: "keyword"
            host_os_nic_name:
              type: "keyword"
            host_os_nic_ip:
              type: "keyword"
            host_os_nic_mac:
              type: "keyword"
            host_os_nic_status:
              type: "keyword"
            host_os_disk_name:
              type: "keyword"
            host_os_disk_vendor:
              type: "keyword"
            host_os_disk_model:
              type: "keyword"
            host_os_disk_serial:
              type: "keyword"
            host_os_disk_state:
              type: "keyword"
            host_os_disk_mount:
              type: "keyword"
            host_os_fs_type:
              type: "keyword"
            host_os_fs_size:
              type: "keyword"
            host_os_fs_used:
              type: "keyword"
            host_os_fs_available:
              type: "keyword"
            host_os_service_name:
              type: "keyword"
            host_os_service_description:
              type: "keyword"
            host_os_service_state:
              type: "keyword"
            host_os_service_mode:
              type: "keyword"
            host_os_service_status:
              type: "keyword"
            host_os_process_name:
              type: "keyword"
            host_os_app_name:
              type: "keyword"
            host_os_app_version:
              type: "keyword"
            host_os_app_vendor:
              type: "keyword"
            host_os_app_arch:
              type: "keyword"
            host_os_app_package:
              type: "keyword"
            host_os_app_install_date:
              type: "keyword"
            host_os_app_group:
              type: "keyword"
            client_ip_address:
              type: "keyword"
            server_ip_address:
              type: "keyword"
            connection_flow:
              type: "keyword"
            connection_protocol:
              type: "keyword"
            connection_state:
              type: "keyword"
            local_ip_address:
              type: "keyword"
            host_cpus:
              type: "double"
            host_cores_per_socket:
              type: "double"
            host_cpu_sockets:
              type: "double"
            host_threads_per_core:
              type: "double"
            host_memory_gb:
